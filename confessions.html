<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İtiraf Köşesi 🕊️</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap"
        rel="stylesheet">

    <!-- OneSignal Push Notification SDK -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script src="onesignal-helper.js"></script>

    <style>
        :root {
            --primary: #ff4b72;
            --bg-color: #0a0208;
            --text-main: #fce4ec;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #background-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1a0510 0%, #0a0208 100%);
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 75, 114, 0.3);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 30px;
            color: var(--primary);
            text-shadow: 0 0 15px rgba(255, 75, 114, 0.5);
        }

        .input-group {
            text-align: left;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 1.1rem;
            color: #ffb1c1;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: 0.3s;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(255, 75, 114, 0.3);
        }

        .buttons {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 15px;
            border-radius: 50px;
            border: none;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-pass {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 5px 15px rgba(255, 75, 114, 0.4);
        }

        .btn-fail {
            background: #444;
            color: #ccc;
        }

        button:hover {
            transform: translateY(-3px) scale(1.02);
        }

        .btn-pass:hover {
            box-shadow: 0 8px 25px rgba(255, 75, 114, 0.6);
        }

        /* Sürpriz Alanı */
        #surprise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.8s;
        }

        #surprise-overlay.show {
            display: flex;
            opacity: 1;
        }

        .surprise-img {
            width: 90%;
            max-width: 500px;
            height: auto;
            max-height: 60vh;
            border-radius: 20px;
            object-fit: cover;
            border: 3px solid var(--primary);
            box-shadow: 0 0 30px rgba(255, 75, 114, 0.5);
            margin-bottom: 20px;
            animation: pulseSurprise 3s infinite;
        }

        @keyframes pulseSurprise {

            0%,
            100% {
                transform: scale(1);
                filter: brightness(1);
            }

            50% {
                transform: scale(1.02);
                filter: brightness(1.2);
            }
        }

        .surprise-text {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: #fff;
            text-shadow: 0 0 20px var(--primary);
            font-weight: 900;
            margin-bottom: 10px;
        }

        .btn-mini {
            flex: none !important;
            /* Esnemesini tamamen engelle */
            width: auto !important;
            min-width: 150px;
            padding: 6px 20px !important;
            font-size: 0.9rem !important;
            margin-top: 5px !important;
            height: 40px !important;
            /* Yüksekliğini sabitle */
            line-height: normal !important;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffb1c1;
            padding: 10px 20px;
            border-radius: 30px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: rgba(255, 75, 114, 0.15);
            border-color: rgba(255, 75, 114, 0.4);
            color: #fff;
            transform: translateX(-3px);
        }

        @media (max-width: 600px) {
            .surprise-text {
                font-size: 2.2rem;
            }

            .container {
                padding: 25px;
                width: 85%;
            }

            h1 {
                font-size: 1.8rem;
            }

            .surprise-img {
                max-height: 50vh;
            }

            .back-btn {
                font-size: 0.85rem;
                padding: 8px 14px;
                top: 15px;
                left: 15px;
            }
        }

        .hidden-message {
            margin-top: 20px;
            font-family: 'Caveat', cursive;
            font-size: 1.5rem;
            color: var(--primary);
            opacity: 0;
            transition: 1s;
        }
    </style>
</head>

<body>

    <div id="background-canvas"></div>
    <a href="index.html#hub" class="back-btn">← Ana Sayfaya Dön</a>

    <!-- Arşiv Butonu (Sağ Üst) -->
    <a href="confession-archive.html" class="archive-link" title="Aşk Arşivi">
        📩 Mektuplarımız
    </a>

    <div class="container" id="main-container">
        <h1>Bize Dair 🕊️</h1>

        <div class="input-group">
            <label>Şu an neden kızgınsın sevgilim? 🥺</label>
            <textarea id="anger-reason" placeholder="Anlat ki seni anlayabileyim..."></textarea>
        </div>

        <div class="input-group">
            <label>Peki tüm bunlara rağmen neden hala seviyorsun? ✨</label>
            <textarea id="love-reason" placeholder="Kalbini buraya dök..."></textarea>
        </div>

        <div class="buttons">
            <button class="btn-pass" onclick="handleSubmit('Aşarız')">Bunu Aşabiliriz ❤️</button>
            <button class="btn-fail" onclick="handleSubmit('Aşamayız')">Aşamayız 🥺</button>
        </div>

        <div id="submit-message" class="hidden-message">Mektubun kalbime mühürlendi... ✨</div>
    </div>

    <!-- Sürpriz Overlay -->
    <div id="surprise-overlay">
        <img src="resim6.jpg" class="surprise-img" alt="Sürpriz">
        <div class="surprise-text">AŞARIZ! ❤️</div>
        <p style="color: #ccc; font-weight: 300; text-align: center; padding: 0 20px; margin: 5px 0;">Şimdi her şeyi
            tatlıya bağlama zamanı...</p>
        <button class="btn-pass btn-mini" onclick="closeSurprise()">Tamam, Aşıyoruz! ✨</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
        import { getFirestore, enableIndexedDbPersistence, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB1EbNEABIODcVts24HpES1UebXQ4wTifU",
            authDomain: "ayseye-surpriz.firebaseapp.com",
            projectId: "ayseye-surpriz",
            storageBucket: "ayseye-surpriz.firebasestorage.app",
            messagingSenderId: "531177459988",
            appId: "1:531177459988:web:09060a95bea0b06f197201",
            measurementId: "G-2LBSDG1KDB"
        };

        var app = initializeApp(firebaseConfig);
        var db = getFirestore(app);
        enableIndexedDbPersistence(db).catch(function (err) { console.log('Offline DB:', err.code); });

        window.handleSubmit = async function (status) {
            var anger = document.getElementById('anger-reason').value.trim();
            var love = document.getElementById('love-reason').value.trim();

            if (!anger || !love) {
                alert("İkisini de doldurmadan mühürleyemem sevgilim ❤️");
                return;
            }

            try {
                // Her durumda veritabanına kaydet
                await addDoc(collection(db, "confessions"), {
                    anger: anger,
                    love: love,
                    status: status,
                    timestamp: serverTimestamp()
                });

                // Kapalıyken bile giden Push Bildirimi
                if (window.sendLoveNotification) {
                    window.sendLoveNotification("Yeni Bir İtiraf Geldi 🕊️", "Sevgilin sana kalbini açtı... Arşive gidip okumak ister misin? ❤️");
                }

                // Her durumda O GÜZEL SÜRPRİZİ GÖSTER
                document.getElementById('surprise-overlay').classList.add('show');

            } catch (e) {
                console.error("Hata:", e);
                alert("Mühürleme hatası! Lütfen tekrar dene sevgilim.");
            }
        };

        window.closeSurprise = function () {
            document.getElementById('surprise-overlay').classList.remove('show');
            window.location.href = 'confession-archive.html';
        };
    </script>
    <style>
        .archive-link {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 75, 114, 0.1);
            padding: 10px 20px;
            border-radius: 30px;
            color: var(--primary);
            text-decoration: none;
            border: 1px solid var(--primary);
            font-weight: 600;
            transition: 0.3s;
            z-index: 20;
        }

        .archive-link:hover {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 0 15px var(--primary);
        }
    </style>
<script type="module" src="time-tracker.js"></script>
</body>

</html>
