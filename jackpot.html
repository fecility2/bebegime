<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aşk Jackpotu 🎰</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffd700;
            --primary: #ff4b72;
            --bg: #0a0208;
            --reel-bg: #1a0510;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            margin: 0;
        }

        .slot-machine {
            background: linear-gradient(145deg, #2a0a1a, #1a0510);
            padding: 40px;
            border-radius: 40px;
            border: 4px solid var(--gold);
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.2), inset 0 0 30px rgba(0,0,0,1);
            position: relative;
        }

        .reels-container {
            display: flex;
            gap: 15px;
            background: #000;
            padding: 15px;
            border-radius: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
            overflow: hidden;
            border: 2px solid rgba(255,215,0,0.3);
        }

        .reel {
            width: 120px; /* Fotoğraflar için biraz genişlik artırıldı */
            height: 150px;
            background: var(--reel-bg);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .reel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.1s;
        }

        .controls {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        #spin-btn {
            padding: 15px 50px;
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(to bottom, #ff4b72, #ab001c);
            color: #fff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 75, 114, 0.4);
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 10;
        }

        #spin-btn:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 15px 40px rgba(255, 75, 114, 0.6);
        }

        #spin-btn:active {
            transform: scale(0.95);
        }

        #spin-btn:disabled {
            background: #444;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
            opacity: 0.7;
        }

        .message {
            margin-top: 20px;
            font-size: 1.2rem;
            min-height: 40px;
            color: var(--gold);
            font-weight: 600;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            text-align: center;
            opacity: 0;
            transition: 0.5s;
            padding: 0 20px;
        }

        .message.visible {
            opacity: 1;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 215, 0, 0.7);
            padding: 10px 20px;
            border-radius: 30px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: rgba(255, 215, 0, 0.15);
            border-color: rgba(255, 215, 0, 0.4);
            color: var(--gold);
            transform: translateX(-3px);
        }

        .wallet-badge {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 215, 0, 0.15);
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 800;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
            z-index: 1000;
        }

        .bet-container {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }

        .bet-input {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--gold);
            color: #fff;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 1.2rem;
            width: 150px;
            text-align: center;
            outline: none;
            font-family: inherit;
        }

        .bet-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        /* Win Animation */
        @keyframes winPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 20px var(--gold)) brightness(1.2); }
            100% { transform: scale(1); }
        }
        .win-animate { animation: winPulse 0.5s 3; }

        @media (max-width: 600px) {
            .reel { width: 85px; height: 110px; }
            .header h1 { font-size: 2.2rem; }
            .slot-machine { padding: 20px; }
            .back-btn {
                font-size: 0.85rem;
                padding: 8px 14px;
                top: 15px;
                left: 15px;
            }
            .wallet-badge {
                top: auto;
                bottom: 20px;
                right: 20px;
                font-size: 0.9rem;
            }
        }

    </style>
</head>
<body>

    <a href="games.html" class="back-btn">← Oyun Dünyası'na Dön</a>
    <div class="wallet-badge" id="wallet-display">0 ❤️</div>

    <div class="header">
        <h1>Aşk Jackpotu ✨</h1>
        <p style="color: rgba(255,215,0,0.6);">Bizim fotoğraflarımızla şansını dene bitanem...</p>
    </div>

    <div class="slot-machine">
        <div class="reels-container">
            <div id="reel1" class="reel"><img src="resim7.jpg" id="img1"></div>
            <div id="reel2" class="reel"><img src="resim8.jpg" id="img2"></div>
            <div id="reel3" class="reel"><img src="resim9.jpg" id="img3"></div>
        </div>
    </div>

    <div class="controls">
        <div class="bet-container">
            <span style="font-size: 1.2rem; color: var(--gold); font-weight: 600;">Bahis:</span>
            <input type="number" id="bet-amount" class="bet-input" placeholder="0" min="1">
        </div>
        <button id="spin-btn" onclick="spin()">Oyna! 🎰</button>
        <div id="message" class="message">Kazandın sevgilim! ✨❤️</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
        import { getFirestore, enableIndexedDbPersistence, doc, updateDoc, onSnapshot, runTransaction, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyB1EbNEABIODcVts24HpES1UebXQ4wTifU",
            authDomain: "ayseye-surpriz.firebaseapp.com",
            projectId: "ayseye-surpriz",
            storageBucket: "ayseye-surpriz.firebasestorage.app",
            messagingSenderId: "531177459988",
            appId: "1:531177459988:web:09060a95bea0b06f197201"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        enableIndexedDbPersistence(db).catch((err) => {
            console.log('Firebase Offline Persistence Error:', err.code);
        });
        const ecoRef = doc(db, 'economy', 'balances');
        const inventoryRef = doc(db, 'user_inventory', localStorage.getItem('active_player') || 'Ayşe');

        const currentUser = localStorage.getItem('active_player');
        if (!currentUser) {
            window.location.href = 'index.html';
        }

        const symbols = [
            'resim7.jpg', 'resim8.jpg', 'resim9.jpg', 
            'resim10.jpg', 'resim11.jpg', 'resim12.jpg'
        ];
        
        const imgs = [
            document.getElementById('img1'),
            document.getElementById('img2'),
            document.getElementById('img3')
        ];
        
        const btn = document.getElementById('spin-btn');
        const msg = document.getElementById('message');
        const betInput = document.getElementById('bet-amount');
        const walletDisp = document.getElementById('wallet-display');

        let currentBalance = 0;
        let activeBet = 0;
        let isSpinning = false;
        let jackpotBoostStock = 0;
        let jackpotChance = 0.07;
        
        // Listen to cloud balances
        onSnapshot(ecoRef, (docSnap) => {
            if(docSnap.exists() && !isSpinning) {
                const data = docSnap.data();
                currentBalance = data[currentUser] || 0;
                walletDisp.innerText = currentUser + ': ' + currentBalance + ' ❤️';
            }
        });

        onSnapshot(inventoryRef, (snap) => {
            if (!snap.exists()) return;
            jackpotBoostStock = snap.data()?.consumables?.jackpot_boost || 0;
        });

        async function saveBalance(newVal) {
            currentBalance = newVal;
            walletDisp.innerText = currentUser + ': ' + currentBalance + ' ❤️';
            await updateDoc(ecoRef, { [currentUser]: currentBalance });
        }

        const winMessages = [
            "İkramiye bizim aşkımız sevgilim! ❤️",
            "Bu fotoğraflar yan yana gelince dünya duruyor! ✨",
            "En büyük ödül sensin! 🎰",
            "Hayatımızın büyük ödülünü beraber kazandık! 💖",
            "Muhteşem üçlü! Şans bizden yana... 🌹"
        ];

        window.spin = async function() {
            if (isSpinning) return;
            activeBet = parseInt(betInput.value);
            
            if (isNaN(activeBet) || activeBet <= 0) {
                msg.innerText = "Lütfen oynamak için Aşk Parası koy sevgilim! 😊";
                msg.classList.add('visible');
                return;
            }
            if (activeBet > currentBalance) {
                msg.innerText = "Yeterli Aşk Paran yok aşkım! Şans Zarını atmaya ne dersin? 🎲";
                msg.classList.add('visible');
                return;
            }

            isSpinning = true;
            jackpotChance = 0.07;
            if (jackpotBoostStock > 0) {
                const useBoost = confirm(`Jackpot Boost (${jackpotBoostStock}) kullanılsın mı?`);
                if (useBoost) {
                    await runTransaction(db, async (tx) => {
                        const invSnap = await tx.get(inventoryRef);
                        const data = invSnap.exists() ? invSnap.data() : {};
                        const cur = data?.consumables?.jackpot_boost || 0;
                        if (cur <= 0) throw new Error('Boost stok yok');
                        tx.set(inventoryRef, {
                            consumables: { ...(data.consumables || {}), jackpot_boost: cur - 1 }
                        }, { merge: true });
                    });
                    jackpotChance = 0.2;
                }
            }

            // Bahisi düş ve kaydet
            await saveBalance(currentBalance - activeBet);

            btn.disabled = true;
            betInput.disabled = true;
            msg.className = 'message';
            
            let spins = 0;
            const maxSpins = 25 + Math.floor(Math.random() * 15);
            
            const interval = setInterval(() => {
                imgs.forEach(img => {
                    img.src = symbols[Math.floor(Math.random() * symbols.length)];
                });
                spins++;

                if (spins >= maxSpins) {
                    clearInterval(interval);
                    finishSpin();
                }
            }, 75);
        }

        async function finishSpin() {
            const results = [];
            
            if (Math.random() < jackpotChance) {
                const winSym = symbols[Math.floor(Math.random() * symbols.length)];
                results.push(winSym, winSym, winSym);
            } else {
                for(let i=0; i<3; i++) {
                    results.push(symbols[Math.floor(Math.random() * symbols.length)]);
                }
            }

            imgs.forEach((img, i) => { img.src = results[i]; });

            if (results[0] === results[1] && results[1] === results[2]) {
                const winnings = activeBet * 3;
                await saveBalance(currentBalance + winnings);
                await addDoc(collection(db, 'activity_logs'), {
                    type: 'game_win',
                    title: 'Aşk Jackpot kazanıldı',
                    user: currentUser,
                    meta: { game: 'jackpot', reward: winnings, bet: activeBet },
                    createdAt: serverTimestamp()
                });

                msg.innerHTML = winMessages[Math.floor(Math.random() * winMessages.length)] + "<br><span style='color: white;'>Kazanılan: <span style='color: #ffd700; font-size: 1.5rem;'>" + winnings + " ❤️</span></span>";
                msg.classList.add('visible');
                imgs.forEach(img => img.parentElement.classList.add('win-animate'));
                shootConfetti();
            } else if (results[0] === results[1] || results[1] === results[2] || results[0] === results[2]) {
                msg.innerText = "Neredeyse aynı fotoğraflar yakalanıyordu! Bahsini (" + activeBet + " ❤️) kaybettin. Bir daha dene meleğim... 💖";
                msg.classList.add('visible');
            } else {
                msg.innerText = "Fotoğraflarımız karıştı, (" + activeBet + " ❤️) uçup gitti! Bir kez daha çevirelim mi? ✨";
                msg.classList.add('visible');
            }

            isSpinning = false;
            setTimeout(() => {
                btn.disabled = false;
                betInput.disabled = false;
                imgs.forEach(img => img.parentElement.classList.remove('win-animate'));
            }, 1000);
        }

        function shootConfetti() {
            confetti({
                particleCount: 200,
                spread: 100,
                origin: { y: 0.6 },
                colors: ['#ff4b72', '#ffd700', '#ffffff']
            });
        }
    </script>
<script type="module" src="time-tracker.js"></script>
</body>
</html>
