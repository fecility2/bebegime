<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aşk Kazı-Kazan 🎟️</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: #fff; margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        #background-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at center, #1a0520 0%, #0a0208 100%);
        }

        .back-nav {
            position: fixed; top: 20px; left: 20px;
            background: rgba(255,255,255,0.05); padding: 10px 20px;
            border-radius: 30px; color: #fff; text-decoration: none;
            border: 1px solid rgba(255,255,255,0.1); z-index: 100;
        }

        .header { margin-top: 60px; text-align: center; }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 3rem; color: var(--primary); margin-bottom: 5px; }

        .wallet-display {
            background: rgba(255, 75, 114, 0.1);
            border: 1px solid var(--primary); padding: 10px 20px; border-radius: 20px;
            font-size: 1.2rem; font-weight: 600; margin: 20px 0;
            display: flex; align-items: center; gap: 8px; justify-content: center;
        }

        .scratch-container {
            position: relative;
            width: 90vw;
            max-width: 320px;
            aspect-ratio: 1/1;
            margin: 20px auto;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            overflow: hidden;
            display: none;
            touch-action: none; /* Mobilde sayfanın kaymasını engeller */
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            z-index: 2;
        }

        .result-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1a0520;
            z-index: 1;
        }

        .result-icon {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        .result-text {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            text-align: center;
            padding: 0 20px;
        }

        .controls {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px; border-radius: 20px;
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
            max-width: 400px; width: 90%;
        }

        .btn-buy {
            background: linear-gradient(45deg, #ff4b72, #ff8c00);
            color: #fff; border: none; padding: 15px 30px; border-radius: 30px;
            font-size: 1.2rem; font-weight: 600; cursor: pointer; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255,75,114,0.4);
        }
        .btn-buy:hover { transform: scale(1.05); }

        .progress-text {
            margin-top: 15px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div id="background-canvas"></div>
    <a href="games.html" class="back-nav">← Oyunlar Menüsü</a>

    <div class="header">
        <h1>Aşk Kazı-Kazan 🎟️</h1>
        <div class="wallet-display" id="wallet-disp">Giriş Yapılıyor... <span>❤️</span></div>
    </div>

    <div class="controls" id="start-panel">
        <h3>Şansını Kazı! ✨</h3>
        <p>Talihe güven sevgilim, belki de büyük ikramiye bu karttadır!</p>
        <p style="opacity: 0.7; font-size: 0.9rem;">Bilet Ücreti: 50 ❤️</p>
        <button class="btn-buy" onclick="buyTicket()">Bilet Al (50 ❤️)</button>
    </div>

    <div class="scratch-container" id="scratch-container">
        <div class="result-content">
            <div class="result-icon" id="res-icon">❓</div>
            <div class="result-text" id="res-text">Kazı ve Gör!</div>
        </div>
        <canvas id="top-canvas" width="320" height="320"></canvas>
    </div>

    <div id="status-msg" style="margin-top: 20px; font-weight: bold; font-size: 1.2rem; text-align: center;"></div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
        import { getFirestore, enableIndexedDbPersistence, doc, getDoc, updateDoc, onSnapshot, runTransaction, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyB1EbNEABIODcVts24HpES1UebXQ4wTifU",
            authDomain: "ayseye-surpriz.firebaseapp.com",
            projectId: "ayseye-surpriz",
            storageBucket: "ayseye-surpriz.firebasestorage.app",
            messagingSenderId: "531177459988",
            appId: "1:531177459988:web:09060a95bea0b06f197201"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        enableIndexedDbPersistence(db).catch(console.error);
        const ecoRef = doc(db, 'economy', 'balances');
        const inventoryRef = doc(db, 'user_inventory', localStorage.getItem('active_player') || 'Ayşe');

        const currentUser = localStorage.getItem('active_player');
        if (!currentUser) window.location.href = 'index.html';

        let userBalance = 0;
        onSnapshot(ecoRef, (docSnap) => {
            if (docSnap.exists()) {
                userBalance = docSnap.data()[currentUser] || 0;
                document.getElementById('wallet-disp').innerHTML = `${userBalance} <span>❤️</span> (${currentUser})`;
            }
        });

        const entryFee = 50;
        let isScratched = false;
        let winAmount = 0;
        let scratchExtraStock = 0;
        let extraChanceActive = false;
        let extraChanceUsed = false;

        onSnapshot(inventoryRef, (snap) => {
            if (!snap.exists()) return;
            scratchExtraStock = snap.data()?.consumables?.scratch_extra || 0;
        });

        window.buyTicket = async function() {
            if (userBalance < entryFee) {
                alert("Yetersiz bakiye! 🥺"); return;
            }

            try {
                extraChanceActive = false;
                extraChanceUsed = false;
                if (scratchExtraStock > 0) {
                    const shouldUse = confirm(`Ekstra Kazıma hakkın var (${scratchExtraStock}). Bu bilette kullanılsın mı?`);
                    if (shouldUse) {
                        await runTransaction(db, async (tx) => {
                            const invSnap = await tx.get(inventoryRef);
                            const data = invSnap.exists() ? invSnap.data() : {};
                            const cur = data?.consumables?.scratch_extra || 0;
                            if (cur <= 0) throw new Error('Stok yok');
                            tx.set(inventoryRef, {
                                consumables: { ...(data.consumables || {}), scratch_extra: cur - 1 }
                            }, { merge: true });
                        });
                        extraChanceActive = true;
                    }
                }
                await updateDoc(ecoRef, { [currentUser]: userBalance - entryFee });
                setupCard();
            } catch (e) {
                alert("Hata oluştu!");
            }
        };

        function setupCard() {
            document.getElementById('start-panel').style.display = 'none';
            const container = document.getElementById('scratch-container');
            container.style.display = 'block';
            document.getElementById('status-msg').innerText = "Parmağınla Kazımaya Başla! 👋";
            
            const canvas = document.getElementById('top-canvas');
            const ctx = canvas.getContext('2d');

            // ÖNEMLİ: Önceki oyundan kalan stilleri sıfırla
            canvas.style.opacity = '1';
            canvas.style.pointerEvents = 'auto';
            canvas.classList.remove('fade-out');
            
            // Çözünürlüğü konteynere göre ayarla
            canvas.width = container.offsetWidth;
            canvas.height = container.offsetHeight;
            
            // Silver layer
            ctx.fillStyle = '#C0C0C0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Texture
            ctx.fillStyle = '#A0A0A0';
            for(let i=0; i<100; i++){
                ctx.beginPath();
                ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*5, 0, Math.PI*2);
                ctx.fill();
            }
            
            // Result Logic
            const prizes = [
                { icon: '💔', text: 'Tüh! Şansını Tekrar Dene', win: 0, weight: 60 },
                { icon: '🎁', text: 'Tebrikler! 100 ❤️', win: 100, weight: 25 },
                { icon: '💎', text: 'Harika! 250 ❤️', win: 250, weight: 10 },
                { icon: '👑', text: 'İNANILMAZ! 1000 ❤️', win: 1000, weight: 5 }
            ];
            
            const rand = Math.random() * 100;
            let current = 0;
            let result;
            for(let p of prizes) {
                current += p.weight;
                if(rand <= current) {
                    result = p;
                    break;
                }
            }
            
            document.getElementById('res-icon').innerText = result.icon;
            document.getElementById('res-text').innerText = result.text;
            winAmount = result.win;
            isScratched = false;

            // Scratching logic
            let isDrawing = false;
            
            function scratch(e) {
                if(!isDrawing) return;
                const rect = canvas.getBoundingClientRect();
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                
                if (!clientX || !clientY) return;

                const x = clientX - rect.left;
                const y = clientY - rect.top;
                
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, 25, 0, Math.PI * 2);
                ctx.fill();
                
                checkProgress();
            }

            canvas.onmousedown = (e) => isDrawing = true;
            canvas.onmouseup = (e) => isDrawing = false;
            canvas.onmousemove = scratch;
            canvas.ontouchstart = (e) => { isDrawing = true; e.preventDefault(); };
            canvas.ontouchend = (e) => isDrawing = false;
            canvas.ontouchmove = scratch;
        }

        function checkProgress() {
            if(isScratched) return;
            
            const canvas = document.getElementById('top-canvas');
            const ctx = canvas.getContext('2d');
            const imageData = ctx.getImageData(0, 0, 320, 320);
            const pixels = imageData.data;
            let transparentPixels = 0;
            
            for(let i = 0; i < pixels.length; i += 4) {
                if(pixels[i+3] < 128) {
                    transparentPixels++;
                }
            }
            
            if(transparentPixels > (320 * 320) * 0.45) { // 45% scratched
                isScratched = true;
                handleWin();
            }
        }

        async function handleWin() {
            const canvas = document.getElementById('top-canvas');
            canvas.classList.add('fade-out');
            canvas.style.opacity = '0';
            canvas.style.pointerEvents = 'none';

            if(winAmount <= 0 && extraChanceActive && !extraChanceUsed) {
                extraChanceUsed = true;
                document.getElementById('status-msg').innerText = "Ekstra Kazıma devrede, bir şans daha! ✨";
                setTimeout(() => {
                    setupCard();
                }, 1200);
                return;
            } else if(winAmount > 0) {
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                document.getElementById('status-msg').innerText = `+${winAmount} ❤️ Hesabına Eklendi! 🎉`;
                try {
                    const snap = await getDoc(ecoRef);
                    const curMoney = snap.data()[currentUser];
                    await updateDoc(ecoRef, { [currentUser]: curMoney + winAmount });
                    await addDoc(collection(db, 'activity_logs'), {
                        type: 'game_win',
                        title: 'Aşk Kazı-Kazan ödülü alındı',
                        user: currentUser,
                        meta: { game: 'scratch', reward: winAmount },
                        createdAt: serverTimestamp()
                    });
                } catch(e){}
            } else {
                document.getElementById('status-msg').innerText = "Kısmet değilmiş sevgilim... 🥺";
            }

            setTimeout(() => {
                document.getElementById('scratch-container').style.display = 'none';
                document.getElementById('start-panel').style.display = 'block';
                document.getElementById('status-msg').innerText = "";
            }, 4000);
        }
    </script>
<script type="module" src="time-tracker.js"></script>
</body>
</html>
