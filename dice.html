<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şans Zarı 🎲</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffd700;
            --primary: #ff4b72;
            --bg: #0a0208;
            --surface: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255, 215, 0, 0.15);
            border-color: rgba(255, 215, 0, 0.4);
            color: var(--gold);
        }

        .wallet-badge {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 215, 0, 0.15);
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 800;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            margin: 0;
        }

        .dice-container {
            perspective: 1000px;
            margin: 40px auto;
            width: 150px;
            height: 150px;
            position: relative;
        }

        .dice-number {
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #fff, #ddd);
            border-radius: 25px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.2), 0 15px 35px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            color: #000;
            font-weight: 800;
            border: 4px solid var(--gold);
            transition: all 0.1s;
        }

        .rolling {
            animation: shake 0.3s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .roll-btn {
            background: linear-gradient(45deg, #ffd700, #ff8c00);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 1.3rem;
            font-family: inherit;
            font-weight: 800;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.3);
            transition: all 0.3s;
            margin-top: 20px;
        }

        .roll-btn:hover:not(:disabled) {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 15px 30px rgba(255, 215, 0, 0.5);
        }

        .roll-btn:disabled {
            background: #555;
            color: #999;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .status-msg {
            margin-top: 25px;
            font-size: 1.2rem;
            text-align: center;
            max-width: 80%;
            min-height: 50px;
            color: #ccc;
        }

        .win-amt {
            color: var(--gold);
            font-size: 1.5rem;
            font-weight: bold;
        }

        .rewards-table {
            margin-top: 40px;
            background: var(--surface);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .rewards-table h3 { color: var(--primary); margin-top: 0; }
        .rewards-table p { margin: 5px 0; font-size: 0.95rem; }

        @media (max-width: 600px) {
            .header h1 { font-size: 2.5rem; }
            .wallet-badge { top: auto; bottom: 20px; right: 20px; }
            .dice-number { font-size: 4rem; }
            .dice-container { width: 120px; height: 120px; }
        }
    </style>
</head>
<body>

    <a href="games.html" class="back-btn">← Oyunlara Dön</a>
    <div class="wallet-badge" id="wallet-display">0 ❤️</div>

    <div class="header">
        <h1>Şans Zarı 🎲</h1>
        <p style="color: rgba(255,215,0,0.6);">Paran bittiğinde kaderine güven...</p>
    </div>

    <div class="dice-container" id="dice-container">
        <div class="dice-number" id="dice-value">?</div>
    </div>

    <button id="roll-btn" class="roll-btn" onclick="rollDice()">Zar At 🎲</button>
    <div class="status-msg" id="status-msg">Zarı atmak için bekliyorum...</div>

    <div class="rewards-table">
        <h3>Ödül Tablosu:</h3>
        <p>1️⃣ = 10 ❤️ | 2️⃣ = 100 ❤️ | 3️⃣ = 150 ❤️</p>
        <p>4️⃣ = 250 ❤️ | 5️⃣ = 400 ❤️ | 6️⃣ = 800 ❤️</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
        import { getFirestore, enableIndexedDbPersistence, doc, getDoc, updateDoc, onSnapshot, runTransaction, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyB1EbNEABIODcVts24HpES1UebXQ4wTifU",
            authDomain: "ayseye-surpriz.firebaseapp.com",
            projectId: "ayseye-surpriz",
            storageBucket: "ayseye-surpriz.firebasestorage.app",
            messagingSenderId: "531177459988",
            appId: "1:531177459988:web:09060a95bea0b06f197201"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        enableIndexedDbPersistence(db).catch((err) => {
            console.log('Firebase Offline Persistence Error:', err.code);
        });
        const ecoRef = doc(db, 'economy', 'balances');
        const inventoryRef = doc(db, 'user_inventory', localStorage.getItem('active_player') || 'Ayşe');

        const currentUser = localStorage.getItem('active_player');
        if (!currentUser) {
            window.location.href = 'index.html'; // Seçim yapmadılarsa başa at
        }
        
        const rollBtn = document.getElementById('roll-btn');
        const diceVal = document.getElementById('dice-value');
        const statusMsg = document.getElementById('status-msg');
        const walletDisp = document.getElementById('wallet-display');
        
        let currentBalance = 0;
        let isRolling = false;
        let diceInsuranceStock = 0;
        let insuranceActive = false;

        // Buluttan dinle
        onSnapshot(ecoRef, (docSnap) => {
            if(docSnap.exists() && !isRolling) {
                const data = docSnap.data();
                currentBalance = data[currentUser] || 0;
                walletDisp.innerText = currentUser + ': ' + currentBalance + ' ❤️';
                checkEligibility();
            }
        });

        onSnapshot(inventoryRef, (snap) => {
            if (!snap.exists()) return;
            diceInsuranceStock = snap.data()?.consumables?.dice_insurance || 0;
        });

        function checkEligibility() {
            if (currentBalance > 0) {
                rollBtn.disabled = true;
                rollBtn.innerText = "Paran Var 😏";
                statusMsg.innerHTML = "Senin zaten aşktan yana yüzün gülmüş, cebinde <span class='win-amt'>" + currentBalance + " ❤️</span> var! Paranı sıfırlamadan buraya gelemezsin. Git önce biraz Jackpot'ta harca bebeğim! 😎";
            } else {
                rollBtn.disabled = false;
                rollBtn.innerText = "Zar At 🎲";
                statusMsg.innerText = "Zarı atmak için bekliyorum...";
            }
        }

        const payouts = { 1: 10, 2: 100, 3: 150, 4: 250, 5: 400, 6: 800 };

        window.rollDice = function() {
            if (currentBalance > 0 || isRolling) return;
            insuranceActive = false;
            isRolling = true;
            rollBtn.disabled = true;
            statusMsg.innerText = "Zar atılıyor... 🎲 Karar anı!";
            diceVal.classList.add('rolling');

            let rollCount = 0;
            const rollInterval = setInterval(() => {
                diceVal.innerText = Math.floor(Math.random() * 6) + 1;
                rollCount++;
                if (rollCount > 15) {
                    clearInterval(rollInterval);
                    finishRoll();
                }
            }, 100);
        }

        async function finishRoll() {
            if (diceInsuranceStock > 0) {
                const shouldUse = confirm(`Zar Sigortası (${diceInsuranceStock}) kullanılsın mı?`);
                if (shouldUse) {
                    await runTransaction(db, async (tx) => {
                        const invSnap = await tx.get(inventoryRef);
                        const data = invSnap.exists() ? invSnap.data() : {};
                        const cur = data?.consumables?.dice_insurance || 0;
                        if (cur <= 0) throw new Error('Sigorta stok yok');
                        tx.set(inventoryRef, {
                            consumables: { ...(data.consumables || {}), dice_insurance: cur - 1 }
                        }, { merge: true });
                    });
                    insuranceActive = true;
                }
            }
            diceVal.classList.remove('rolling');
            const finalResult = Math.floor(Math.random() * 6) + 1;
            diceVal.innerText = finalResult;

            let wonAmount = payouts[finalResult];
            if (insuranceActive && wonAmount < 100) {
                wonAmount = 100;
            }
            currentBalance += wonAmount;
            
            // Firebase'e Kaydet
            await updateDoc(ecoRef, { [currentUser]: currentBalance });
            await addDoc(collection(db, 'activity_logs'), {
                type: 'game_win',
                title: 'Şans Zarı oynandı',
                user: currentUser,
                meta: { game: 'dice', reward: wonAmount, result: finalResult },
                createdAt: serverTimestamp()
            });

            walletDisp.innerText = currentUser + ': ' + currentBalance + ' ❤️';
            statusMsg.innerHTML = "Harika! Zar <span class='win-amt'>" + finalResult + "</span> geldi ve <span class='win-amt'>" + wonAmount + " ❤️</span> kazandın! 🎉 Şimdi doğruca Aşk Jackpot oynamaya!";
            
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 },
                colors: ['#ffd700', '#ff8c00', '#ffffff']
            });

            isRolling = false;
            checkEligibility();
        }
    </script>
<script type="module" src="time-tracker.js"></script>
</body>
</html>
