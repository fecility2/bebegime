<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çalma Listemiz 🎧</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #121212;
            color: #fff;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* Ana Sayfaya Dön Butonu */
        .back-nav {
            position: fixed;
            top: 20px; 
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 30px;
            color: #fff;
            text-decoration: none;
            z-index: 100;
            backdrop-filter: blur(10px);
            font-size: 0.95rem;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-nav:hover {
            background: #1db954;
            border-color: #1ed760;
            transform: scale(1.05);
        }

        /* Spotify Tarzı Gradyanlı Üst Kısım */
        .spotify-header {
            background: linear-gradient(to bottom, #1db954 0%, #121212 100%);
            padding: 100px 20px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .playlist-cover {
            width: 220px;
            height: 220px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            margin-bottom: 25px;
            object-fit: cover;
            border-radius: 12px;
        }

        .playlist-title {
            font-size: 2.8rem;
            font-weight: 700;
            margin: 0 0 10px 0;
            line-height: 1.2;
            letter-spacing: -1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .playlist-desc {
            font-size: 1.1rem;
            opacity: 0.8;
            font-weight: 300;
        }
        
        .spotify-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .iframe-container {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-top: 10px;
            transition: transform 0.3s;
        }

        .iframe-container:hover {
            transform: translateY(-5px);
        }

        .info-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-top: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: left;
        }

        .info-card h3 {
            color: #1db954;
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-card p, .info-card li {
            color: #b3b3b3;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .info-card ul {
            padding-left: 20px;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .spotify-header {
                padding: 90px 20px 30px;
            }
            .playlist-cover {
                width: 180px;
                height: 180px;
            }
            .playlist-title {
                font-size: 2.2rem;
            }
            .back-nav {
                top: 15px;
                left: 15px;
                padding: 8px 15px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-nav"><span>←</span> Ana Sayfaya Dön</a>

    <div class="spotify-header">
        <!-- Kapak fotoğrafı, şu an resim9.jpg var -->
        <img src="resim9.jpg" class="playlist-cover" alt="Playlist Cover">
        <h1 class="playlist-title">Bizim Şarkılarımız ❤️</h1>
        <div class="playlist-desc">Sadece ikimize özel, dünyanın en güzel çalma listesi...</div>
    </div>

    <div class="spotify-container">
        
        <p style="color: #1db954; font-weight: 600; font-size: 1.1rem; margin-bottom: 10px; display: flex; align-items: center; gap: 8px;">
            <span>🎧</span> Çalma Listesi Player
        </p>
        
        <!-- Orijinal Spotify Embed Player -->
        <div class="iframe-container">
            <!-- Sizin özel çalma listeniz eklendi -->
            <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/4V2wcD8Rm3G4JuXDDHjt1K?utm_source=generator&theme=0" width="100%" height="500" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>

    </div>

</body>
</html>
