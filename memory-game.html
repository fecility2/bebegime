<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aşk Hafızası 🃏</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@1,600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #background-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1a0520 0%, #0a0208 100%);
        }

        .back-nav {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 30px;
            color: #fff;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        .header {
            margin-top: 60px;
            text-align: center;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .wallet-display {
            background: rgba(255, 75, 114, 0.1);
            border: 1px solid var(--primary);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: 600;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 600px;
            margin: 0 auto 30px;
            display: none;
            /* starts hidden */
        }

        .memory-card {
            width: 80px;
            height: 100px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .memory-card.flip .card-inner {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 10px;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--primary);
            box-shadow: 0 5px 15px rgba(255, 75, 114, 0.2);
            overflow: hidden;
        }

        .card-front {
            background: linear-gradient(135deg, #1a0520, #ff4b72);
            font-size: 2rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .card-back {
            transform: rotateY(180deg);
            background: #000;
        }

        .card-back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .controls {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-play {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 75, 114, 0.4);
        }

        .btn-play:hover {
            transform: scale(1.05);
        }

        .timer {
            font-size: 1.5rem;
            color: #ff8c00;
            font-weight: 700;
            display: none;
        }

        @media (max-width: 768px) {
            .memory-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }

            .memory-card {
                width: 90px;
                height: 110px;
            }
        }
    </style>
</head>

<body>

    <div id="background-canvas"></div>
    <a href="games.html" class="back-nav">← Oyunlar Menüsü</a>

    <div class="header">
        <h1>Aşk Hafızası 🃏</h1>
        <div class="wallet-display" id="wallet-disp">Giriş Yapılıyor... <span>❤️</span></div>
    </div>

    <div class="controls" id="start-panel">
        <h3>Bizi Ne Kadar Hatırlıyorsun? 📸</h3>
        <p>Bütün fotoğrafların eşini 20 saniyede bul, Aşk Parası (❤️) kazan!</p>
        <p style="opacity: 0.7; font-size: 0.9rem;">Giriş Ücreti: 100 ❤️ | Büyük Ödül: 300 ❤️</p>
        <button class="btn-play" onclick="startGame()">100 ❤️ Oyna</button>
    </div>

    <div class="timer" id="timer-display">20</div>

    <div class="memory-grid" id="grid">
        <!-- Cards Generated by JS -->
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
        import { getFirestore, enableIndexedDbPersistence, doc, getDoc, updateDoc, onSnapshot, runTransaction, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB1EbNEABIODcVts24HpES1UebXQ4wTifU",
            authDomain: "ayseye-surpriz.firebaseapp.com",
            projectId: "ayseye-surpriz",
            storageBucket: "ayseye-surpriz.firebasestorage.app",
            messagingSenderId: "531177459988",
            appId: "1:531177459988:web:09060a95bea0b06f197201"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        enableIndexedDbPersistence(db).catch(console.error);
        const ecoRef = doc(db, 'economy', 'balances');
        const inventoryRef = doc(db, 'user_inventory', localStorage.getItem('active_player') || 'Ayşe');

        const currentUser = localStorage.getItem('active_player');
        if (!currentUser) window.location.href = 'index.html';

        let userBalance = 0;

        onSnapshot(ecoRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                userBalance = data[currentUser] || 0;
                document.getElementById('wallet-disp').innerHTML = `${userBalance} <span>❤️</span> (${currentUser})`;
            }
        });

        onSnapshot(inventoryRef, (snap) => {
            if (!snap.exists()) return;
            memoryRetryStock = snap.data()?.consumables?.memory_retry || 0;
            updateHintText();
        });

        const entryFee = 100;
        const winPrize = 300;
        let memoryRetryStock = 0;
        let retryEnabledForRound = false;
        let retryAlreadyUsed = false;
        let isPlaying = false;
        let timeLeft = 20;
        let timerInterval;

        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let matchedPairs = 0;
        const totalPairs = 6;

        window.startGame = async function () {
            if (userBalance < entryFee) {
                alert("Yetersiz bakiye sevgilim! Biraz para kazanman lazım... 🥺");
                return;
            }

            try {
                retryEnabledForRound = false;
                retryAlreadyUsed = false;
                if (memoryRetryStock > 0) {
                    retryEnabledForRound = confirm(`İkinci Şans ürünün var (${memoryRetryStock}). Bu turda kullanılsın mı?`);
                    if (retryEnabledForRound) {
                        await runTransaction(db, async (tx) => {
                            const invSnap = await tx.get(inventoryRef);
                            const invData = invSnap.exists() ? invSnap.data() : {};
                            const current = invData?.consumables?.memory_retry || 0;
                            if (current <= 0) throw new Error('Stok yok');
                            tx.set(inventoryRef, {
                                consumables: { ...(invData.consumables || {}), memory_retry: current - 1 }
                            }, { merge: true });
                        });
                    }
                }
                await updateDoc(ecoRef, { [currentUser]: userBalance - entryFee });
                document.getElementById('start-panel').style.display = 'none';
                document.getElementById('grid').style.display = 'grid';
                document.getElementById('timer-display').style.display = 'block';
                initGame();
            } catch (e) {
                console.error(e);
                alert("Buluta bağlanamadık...");
            }
        }

        function initGame() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            // ===== Tüm oyun durumunu sıfırla (tekrar oynamada bug oluşmasın) =====
            matchedPairs = 0;
            hasFlippedCard = false;
            lockBoard = false;
            firstCard = null;
            secondCard = null;
            clearInterval(timerInterval); // Önceki timer varsa temizle

            timeLeft = 20;
            const timerObj = document.getElementById('timer-display');
            timerObj.innerText = timeLeft;
            timerObj.style.color = '#ff8c00'; // Rengi sıfırla

            // 6 Resim
            const imgs = ['resim1.jpg', 'resim2.jpg', 'resim3.jpg', 'resim4.jpg', 'resim5.jpg', 'resim6.jpg'];
            const deck = [...imgs, ...imgs];
            deck.sort(() => Math.random() - 0.5);

            deck.forEach((imgSrc) => {
                const card = document.createElement('div');
                card.classList.add('memory-card');
                card.dataset.img = imgSrc;
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">?</div>
                        <div class="card-back"><img src="${imgSrc}"></div>
                    </div>
                `;
                card.addEventListener('click', flipCard);
                grid.appendChild(card);
            });

            timerInterval = setInterval(() => {
                timeLeft--;
                timerObj.innerText = timeLeft;
                if (timeLeft <= 0) {
                    if (retryEnabledForRound && !retryAlreadyUsed) {
                        retryAlreadyUsed = true;
                        timeLeft = 10;
                        timerObj.style.color = '#1ed760';
                        timerObj.innerText = 'Ekstra Şans +10';
                        setTimeout(() => {
                            timerObj.style.color = '#ff8c00';
                            timerObj.innerText = timeLeft;
                        }, 700);
                    } else {
                        endGame(false);
                    }
                }
            }, 1000);
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            checkForMatch();
        }

        function checkForMatch() {
            const isMatch = firstCard.dataset.img === secondCard.dataset.img;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            resetBoard();

            matchedPairs++;
            if (matchedPairs === totalPairs) {
                endGame(true);
            }
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1000);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        async function endGame(win) {
            clearInterval(timerInterval);
            lockBoard = true;

            const grid = document.getElementById('grid');
            const timerObj = document.getElementById('timer-display');

            if (win) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                timerObj.innerText = `Harikasın! +${winPrize} ❤️ Kazandın 🎉`;
                try {
                    const snap = await getDoc(ecoRef);
                    const curMoney = snap.data()[currentUser];
                    await updateDoc(ecoRef, { [currentUser]: curMoney + winPrize });
                    await addDoc(collection(db, 'activity_logs'), {
                        type: 'game_win',
                        title: 'Aşk Hafızası kazanıldı',
                        user: currentUser,
                        meta: { game: 'memory', reward: winPrize },
                        createdAt: serverTimestamp()
                    });
                } catch (e) { }
            } else {
                timerObj.innerText = `Süre Bitti! 😢`;
                timerObj.style.color = '#ff4b72';
            }

            setTimeout(() => {
                grid.style.display = 'none';
                timerObj.style.display = 'none';
                document.getElementById('start-panel').style.display = 'block';
                timerObj.style.color = '#ff8c00'; // reset style
            }, 3000);
        }

        function updateHintText() {
            const panel = document.getElementById('start-panel');
            if (!panel) return;
            const hint = panel.querySelector('p');
            if (!hint) return;
            hint.textContent = `Bütün fotoğrafların eşini 20 saniyede bul, Aşk Parası (❤️) kazan! İkinci Şans Stok: ${memoryRetryStock}`;
        }
    </script>
<script type="module" src="time-tracker.js"></script>
</body>

</html>
