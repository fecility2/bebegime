<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sürpriz Zarflar 💌</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: #fff;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #background-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1a0520 0%, #0a0208 100%);
        }

        .back-nav {
            position: fixed;
            top: 20px; left: 20px;
            background: rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 30px;
            color: #fff;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .header {
            margin-top: 60px;
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: var(--primary);
            text-shadow: 0 0 15px rgba(255, 75, 114, 0.5);
            margin-bottom: 15px;
        }

        .header p {
            opacity: 0.8;
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .compose-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            border: 1px solid var(--primary);
            padding: 30px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(255, 75, 114, 0.15);
        }

        .compose-container h3 {
            margin-top: 0;
            font-family: 'Playfair Display', serif;
            color: var(--primary);
            font-size: 1.8rem;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 15px;
            border-radius: 15px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            resize: none;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        input[type="datetime-local"] {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 12px 15px;
            border-radius: 15px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            margin-bottom: 20px;
            box-sizing: border-box;
            color-scheme: dark;
        }

        .btn-seal {
            background: linear-gradient(45deg, #ff4b72, #ff8c00);
            border: none;
            color: #fff;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(255,75,114,0.3);
        }

        .btn-seal:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255,75,114,0.5);
        }

        .envelopes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 900px;
            padding-bottom: 50px;
        }

        .envelope-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            text-align: center;
            transition: all 0.3s;
            position: relative;
        }

        .envelope-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255,255,255,0.3);
        }

        .env-icon {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }

        .env-meta {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 15px;
        }

        .env-status {
            font-size: 0.95rem;
            font-weight: 600;
            padding: 8px 15px;
            border-radius: 15px;
            display: inline-block;
        }

        .status-locked {
            color: #ff8c00;
            background: rgba(255, 140, 0, 0.1);
            border: 1px solid rgba(255, 140, 0, 0.3);
            cursor: pointer;
        }

        .status-open {
            color: #1ed760;
            background: rgba(30, 215, 96, 0.1);
            border: 1px solid rgba(30, 215, 96, 0.3);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(30, 215, 96, 0.2);
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 5px rgba(30,215,96,0.2); }
            to { box-shadow: 0 0 20px rgba(30,215,96,0.5); }
        }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,2,8,0.9); z-index: 1000;
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: linear-gradient(135deg, #1a0a14 0%, #0d0208 100%);
            padding: 50px 45px; border-radius: 30px;
            width: 90%; max-width: 620px; position: relative;
            border: 1.5px solid rgba(255, 75, 114, 0.4);
            text-align: center;
            box-shadow: 0 0 60px rgba(255, 75, 114, 0.25), inset 0 0 30px rgba(255, 75, 114, 0.05);
            max-height: 85vh; overflow-y: auto;
        }

        .letter-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            display: block;
        }

        .modal-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 25px;
            opacity: 0.9;
        }

        .modal-content p {
            font-family: 'Outfit', sans-serif;
            font-size: 1.15rem;
            line-height: 1.9;
            white-space: pre-wrap;
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.92);
            text-align: left;
            background: rgba(255, 255, 255, 0.03);
            padding: 25px 30px;
            border-radius: 20px;
            border-left: 3px solid var(--primary);
            letter-spacing: 0.02em;
        }

        .close-btn {
            position: absolute; top: 15px; right: 20px;
            font-size: 30px; cursor: pointer; color: #fff;
            opacity: 0.7; transition: 0.3s;
        }

        .close-btn:hover { opacity: 1; color: var(--primary); }

        @media (max-width: 768px) {
            .header h1 { font-size: 2.5rem; }
            .envelopes-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="background-canvas"></div>
    <a href="index.html" class="back-nav">← Ana Sayfaya Dön</a>

    <div class="header">
        <h1>Sürpriz Zarflar 💌</h1>
        <p>Geleceğe bıraktığımız sırlar, itiraflar ve aşk sözcükleri...</p>
    </div>

    <div class="compose-container" style="text-align: center;">
        <a href="envelope-archive.html" class="btn-seal" style="max-width: 250px; display: inline-block; text-decoration: none; margin-bottom: 30px; font-size: 1rem; padding: 12px 20px; background: linear-gradient(45deg, #1ed760, #1db954);">Zaman Kapsülü ⏳</a>
        <h3 style="text-align: left;">Yeni Bir Zarf Hazırla 🔒</h3>
        <p style="opacity: 0.8; font-size: 0.95rem; margin-bottom: 15px; text-align: left;">
            Yazdığın mektup mühürlenecek ve seçtiğin tarihe kadar asla açılamayacak.
        </p>
        <textarea id="env-message" placeholder="Gelecekteki ona söylemek istediklerin..."></textarea>
        <label style="display: block; margin-bottom: 8px; opacity: 0.9; font-size: 0.9rem; text-align: left;">Ne zaman açılsın?</label>
        <input type="datetime-local" id="env-time">
        <button class="btn-seal" id="btn-seal" onclick="sendEnvelope()">Mühürle ve Geleceğe Gönder ✨</button>
        <div id="send-status" style="margin-top: 10px; color: #1ed760; display: none; font-weight: bold; text-align: center;">Zarf Mühürlendi! 💌</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
        import { getFirestore, enableIndexedDbPersistence, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyB1EbNEABIODcVts24HpES1UebXQ4wTifU",
            authDomain: "ayseye-surpriz.firebaseapp.com",
            projectId: "ayseye-surpriz",
            storageBucket: "ayseye-surpriz.firebasestorage.app",
            messagingSenderId: "531177459988",
            appId: "1:531177459988:web:09060a95bea0b06f197201"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        enableIndexedDbPersistence(db).catch((err) => {
            console.log('Firebase Offline Persistence Error:', err.code);
        });
        const envRef = collection(db, 'locked_envelopes');

        const currentUser = localStorage.getItem('active_player');
        if (!currentUser) {
            window.location.href = 'index.html';
        }
        
        const receiverUser = currentUser === 'Ayşe' ? 'Mert' : 'Ayşe';

        window.sendEnvelope = async function() {
            const msgObj = document.getElementById('env-message');
            const timeObj = document.getElementById('env-time');
            const btn = document.getElementById('btn-seal');
            
            const msg = msgObj.value.trim();
            const timeVal = timeObj.value;

            if (!msg || !timeVal) {
                alert("Lütfen bir mesaj yaz ve açılacağı zamanı seç sevgilim!");
                return;
            }

            const unlockDate = new Date(timeVal).getTime();
            if (unlockDate <= new Date().getTime()) {
                alert("Mühür tarihi gelecekten bir an olmalı!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Mühürleniyor... ⏳";

            await addDoc(envRef, {
                sender: currentUser,
                receiver: receiverUser,
                message: msg,
                unlock_date: unlockDate,
                created_at: serverTimestamp()
            });

            msgObj.value = "";
            timeObj.value = "";
            btn.innerText = "Mühürle ve Geleceğe Gönder ✨";
            btn.disabled = false;
            
            const st = document.getElementById('send-status');
            st.style.display = 'block';
            setTimeout(() => st.style.display = 'none', 3000);
        };

    </script>
</body>
</html>
