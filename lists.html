<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listelerimiz 📜✨</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📜</text></svg>">
    
    <style>
        :root {
            --primary: #ff4b72;
            --secondary: #a18cd1;
            --bg: #0a0208;
            --surface: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #fce4ec;
            --ayse-color: #ff85a2;
            --mert-color: #72baff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at top right, rgba(255, 75, 114, 0.1), transparent 400px),
                radial-gradient(circle at bottom left, rgba(161, 140, 209, 0.1), transparent 400px);
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 10px 20px;
            border-radius: 30px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: rgba(255, 75, 114, 0.15);
            border-color: rgba(255, 75, 114, 0.4);
            color: #fff;
            transform: translateX(-3px);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 80px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px var(--primary);
        }

        /* Sekmeler (Mert vs Ayşe) */
        .owner-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: #fff;
            padding: 15px 40px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.25rem;
            font-weight: 600;
            transition: 0.3s;
            backdrop-filter: blur(10px);
            font-family: 'Outfit', sans-serif;
        }

        .tab-btn.active.tab-ayse {
            background: rgba(255, 133, 162, 0.2);
            border-color: var(--ayse-color);
            box-shadow: 0 0 20px rgba(255, 133, 162, 0.3);
        }

        .tab-btn.active.tab-mert {
            background: rgba(114, 186, 255, 0.2);
            border-color: var(--mert-color);
            box-shadow: 0 0 20px rgba(114, 186, 255, 0.3);
        }

        /* Kategoriler */
        .category-tabs {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 40px;
        }

        .cat-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            color: #ccc;
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.3s;
            font-family: 'Outfit', sans-serif;
        }

        .cat-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(255, 75, 114, 0.4);
        }

        /* Liste Ekleme */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 40px;
            background: var(--surface);
            padding: 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        .input-group input {
            flex: 1;
            background: none;
            border: none;
            color: #fff;
            padding: 15px;
            font-size: 1.1rem;
            outline: none;
            font-family: inherit;
        }

        .add-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 0 30px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .add-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--primary);
        }

        /* Liste Görünümü */
        .list-container {
            display: grid;
            gap: 15px;
        }

        .list-item {
            background: var(--surface);
            border-radius: 15px;
            padding: 15px 20px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.3s;
            backdrop-filter: blur(10px);
            gap: 15px;
        }

        .list-item:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .item-text {
            flex: 1;
            text-align: center;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            font-size: 1.25rem;
            letter-spacing: 0.5px;
            color: #fff;
        }

        /* Kişisel Tikler */
        .person-check {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: 0.3s;
            opacity: 0.5;
        }
        
        .person-check:hover {
            opacity: 0.8;
            transform: scale(1.1);
        }

        .person-check.checked {
            opacity: 1;
        }

        .check-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .ayse-check.checked .check-icon {
            color: var(--ayse-color);
            text-shadow: 0 0 10px var(--ayse-color);
        }

        .mert-check.checked .check-icon {
            color: var(--mert-color);
            text-shadow: 0 0 10px var(--mert-color);
        }

        .check-icon {
            font-size: 24px;
            transition: 0.3s;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ff4b72;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 5px;
            opacity: 0.6;
            transition: 0.3s;
        }

        .delete-btn:hover {
            opacity: 1;
            transform: scale(1.2) rotate(10deg);
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 2.2rem; }
            .tab-btn { padding: 10px 20px; font-size: 1rem; }
            .item-text { font-size: 1.15rem; }
            .list-item { padding: 15px 10px; gap: 10px; }
            .check-icon { font-size: 18px; }
            .input-group { flex-direction: column; }
            .input-group input { width: 100%; border-radius: 12px; margin-bottom: 5px; }
            .add-btn { width: 100%; padding: 12px; border-radius: 12px; }
            
            /* Kategori butonlarını mobilde yatayda zekice (2x2) sığdırma */
            .category-tabs { gap: 8px; justify-content: space-between; }
            .cat-btn { 
                width: calc(50% - 4px); /* Aradaki gap'in yarısını çıkarıyoruz */
                padding: 10px 5px; 
                font-size: 0.95rem; 
                text-align: center; 
            }
        }

    </style>
</head>

<body>
    <a href="index.html" class="back-btn">← Ana Sayfaya Dön</a>

    <div class="container">
        <div class="header">
            <h1>Listelerimiz 📜✨</h1>
            <p>Beraber okuyacağımız, izleyeceğimiz ve dinleyeceğimiz her şey burada!</p>
        </div>

        <div class="owner-tabs">
            <button class="tab-btn tab-ayse active" onclick="setOwner('ayse')">Ayşe'nin Listesi 🌸</button>
            <button class="tab-btn tab-mert" onclick="setOwner('mert')">Mert'in Listesi 🌊</button>
        </div>

        <div class="category-tabs">
            <button class="cat-btn cat-kitap active" onclick="setCategory('kitap')">Kitap 📚</button>
            <button class="cat-btn cat-film" onclick="setCategory('film')">Film 🎬</button>
            <button class="cat-btn cat-dizi" onclick="setCategory('dizi')">Dizi 📺</button>
            <button class="cat-btn cat-muzik" onclick="setCategory('muzik')">Müzik 🎵</button>
        </div>

        <div class="input-group">
            <input type="text" id="item-input" placeholder="Listeye yeni bir şey ekle sevgilim...">
            <button class="add-btn" id="add-btn">Ekle</button>
        </div>

        <div class="list-container" id="list-container">
            <!-- Liste elemanları buraya gelecek -->
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
        import {
            getFirestore, enableIndexedDbPersistence, collection, addDoc, updateDoc, deleteDoc, doc,
            onSnapshot, query, orderBy, serverTimestamp
        } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyB1EbNEABIODcVts24HpES1UebXQ4wTifU",
            authDomain: "ayseye-surpriz.firebaseapp.com",
            projectId: "ayseye-surpriz",
            storageBucket: "ayseye-surpriz.firebasestorage.app",
            messagingSenderId: "531177459988",
            appId: "1:531177459988:web:09060a95bea0b06f197201",
            measurementId: "G-2LBSDG1KDB"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        enableIndexedDbPersistence(db).catch(err => console.log('Offline DB hatası:', err.code));
        const listRef = collection(db, 'our_lists');

        let currentOwner = 'ayse';
        let currentCategory = 'kitap';
        let allItems = [];

        window.setOwner = (owner) => {
            currentOwner = owner;
            document.querySelectorAll('.owner-tabs .tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.tab-btn.tab-${owner}`).classList.add('active');
            renderList();
        };

        window.setCategory = (cat) => {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.cat-btn.cat-${cat}`).classList.add('active');
            renderList();
        };

        const q = query(listRef, orderBy('createdAt', 'desc'));
        onSnapshot(q, (snapshot) => {
            allItems = [];
            snapshot.forEach((doc) => {
                allItems.push({ id: doc.id, ...doc.data() });
            });
            renderList();
        });

        function renderList() {
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            
            const filtered = allItems.filter(item => item.owner === currentOwner && item.category === currentCategory);
            
            if (filtered.length === 0) {
                container.innerHTML = `<p style="text-align: center; opacity: 0.5; margin-top: 20px;">Henüz bu listeye bir şey eklenmemiş 🥺</p>`;
                return;
            }

            filtered.forEach(item => {
                const el = document.createElement('div');
                el.className = 'list-item';
                
                // Ayşe's Check
                const ayseChecked = item.ayseChecked ? 'checked' : '';
                const ayseIcon = item.ayseChecked ? '💗' : '🤍';
                
                // Mert's Check
                const mertChecked = item.mertChecked ? 'checked' : '';
                const mertIcon = item.mertChecked ? '💙' : '🤍';

                el.innerHTML = `
                    <div class="person-check ayse-check ${ayseChecked}" onclick="toggleCheck('${item.id}', 'ayse', ${item.ayseChecked})">
                        <span class="check-label">Ayşe</span>
                        <span class="check-icon">${ayseIcon}</span>
                    </div>

                    <div class="item-text">${item.text}</div>

                    <div class="person-check mert-check ${mertChecked}" onclick="toggleCheck('${item.id}', 'mert', ${item.mertChecked})">
                        <span class="check-label">Mert</span>
                        <span class="check-icon">${mertIcon}</span>
                    </div>

                    <button class="delete-btn" onclick="removeItem('${item.id}')" title="Sil">🗑️</button>
                `;
                container.appendChild(el);
            });
        }

        document.getElementById('add-btn').onclick = async () => {
            const input = document.getElementById('item-input');
            const text = input.value.trim();
            if (!text) return;
            
            await addDoc(listRef, { 
                owner: currentOwner,
                category: currentCategory,
                text: text, 
                ayseChecked: false,
                mertChecked: false,
                createdAt: serverTimestamp() 
            });
            input.value = '';
        };

        window.toggleCheck = async (id, person, currentState) => {
            const updateData = {};
            if (person === 'ayse') {
                updateData.ayseChecked = !currentState;
            } else {
                updateData.mertChecked = !currentState;
            }
            await updateDoc(doc(db, 'our_lists', id), updateData);
        };

        window.removeItem = async (id) => {
            if (confirm("Bu maddeyi liseden silmek istediğine emin misin sevgilim? 🥺")) {
                await deleteDoc(doc(db, 'our_lists', id));
            }
        };

        // Enter ile ekleme
        document.getElementById('item-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                document.getElementById('add-btn').click();
            }
        });
    </script>
</body>
</html>
