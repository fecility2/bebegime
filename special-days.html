<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Özel Günlerimiz 📅</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
    
    <!-- OneSignal Push Notification SDK -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script src="onesignal-helper.js"></script>

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: #fff;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #background-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1a0520 0%, #0a0208 100%);
        }

        .back-nav {
            position: fixed;
            top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 30px;
            color: #fff;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .header {
            margin-top: 60px;
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: var(--primary);
            text-shadow: 0 0 15px rgba(255, 75, 114, 0.5);
            margin-bottom: 15px;
        }

        .header p {
            opacity: 0.8;
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto 20px;
            line-height: 1.6;
        }

        .add-btn {
            background: linear-gradient(135deg, var(--primary), #c62a6e);
            color: #fff;
            border: none;
            padding: 14px 32px;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 75, 114, 0.4);
            transition: all 0.3s;
            margin-bottom: 35px;
        }

        .add-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(255, 75, 114, 0.5);
        }

        .days-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
            padding-bottom: 50px;
        }

        .day-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            text-align: center;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 220px;
        }

        .day-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 15px 30px rgba(255, 75, 114, 0.2);
        }

        .day-card.custom-card {
            border-color: rgba(255, 75, 114, 0.2);
        }

        .day-icon { font-size: 4rem; margin-bottom: 15px; }
        .day-title { font-size: 1.6rem; margin-bottom: 10px; font-family: 'Playfair Display', serif; }
        .day-date { font-family: 'Caveat', cursive; font-size: 1.6rem; color: rgba(255,255,255,0.6); margin-bottom: 15px; }

        .day-countdown {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--gold, #ffd700);
            background: rgba(255, 215, 0, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            display: inline-block;
            margin-top: auto;
        }

        .day-passed { color: #1ed760; background: rgba(30,215,96,0.1); border-color: rgba(30,215,96,0.3); }
        .day-future { color: #ff9f9f; background: rgba(255,75,114,0.1); border-color: rgba(255,75,114,0.3); }

        .is-today { animation: pulse-card 2s infinite; border-color: #ffd700; }

        @keyframes pulse-card {
            0%   { box-shadow: 0 0 15px rgba(255,215,0,0.2); }
            50%  { box-shadow: 0 0 35px rgba(255,215,0,0.6); }
            100% { box-shadow: 0 0 15px rgba(255,215,0,0.2); }
        }

        /* Sil butonu */
        .delete-btn {
            position: absolute;
            top: 12px; right: 12px;
            background: rgba(255,75,114,0.15);
            border: 1px solid rgba(255,75,114,0.3);
            color: #ff6b8a;
            border-radius: 50%;
            width: 30px; height: 30px;
            font-size: 14px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            opacity: 0;
        }

        .day-card:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { background: rgba(255,75,114,0.4); transform: scale(1.1); }

        /* === MODAL === */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.open { display: flex; }

        .modal-box {
            background: linear-gradient(135deg, #1a0520, #0d0110);
            border: 1px solid rgba(255,75,114,0.3);
            border-radius: 25px;
            padding: 40px 35px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.8), 0 0 50px rgba(255,75,114,0.1);
            animation: modalIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalIn {
            from { transform: scale(0.85); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }

        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--primary);
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.7;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            padding: 12px 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
            appearance: none;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-group input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        .form-group select option {
            background: #1a0520;
        }

        .emoji-picker {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 5px;
        }

        .emoji-btn {
            background: rgba(255,255,255,0.07);
            border: 2px solid transparent;
            border-radius: 10px;
            font-size: 1.5rem;
            width: 45px; height: 45px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
        }

        .emoji-btn:hover, .emoji-btn.selected {
            border-color: var(--primary);
            background: rgba(255,75,114,0.15);
            transform: scale(1.1);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        .btn-save {
            flex: 1;
            background: linear-gradient(135deg, var(--primary), #c62a6e);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 15px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255,75,114,0.4); }

        .btn-cancel {
            background: rgba(255,255,255,0.07);
            color: rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px 20px;
            border-radius: 15px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-cancel:hover { background: rgba(255,255,255,0.12); }

        /* Yükleniyor */
        .loading-text {
            text-align: center;
            opacity: 0.5;
            font-size: 1rem;
            padding: 40px;
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 2.5rem; }
            .header p   { font-size: 1.1rem; }
            .day-card   { padding: 25px 20px; min-height: 200px; }
            .day-icon   { font-size: 3rem; }
            .modal-box  { padding: 30px 22px; }
            .delete-btn { opacity: 1; }
        }
    </style>
</head>

<body>

    <div id="background-canvas"></div>
    <a href="index.html#hub" class="back-nav">← Ana Sayfaya Dön</a>

    <div class="header">
        <h1>Özel Günlerimiz 📅</h1>
        <p>Birlikte paylaştığımız, heyecanla beklediğimiz ve sayarak büyüttüğümüz o harika günler...</p>
        <button class="add-btn" onclick="openModal()">✨ Özel Gün Ekle</button>
    </div>

    <div class="days-container" id="days-container">
        <div class="loading-text">Günler yükleniyor... 💫</div>
    </div>

    <!-- Ekle Modalı -->
    <div class="modal-overlay" id="add-modal" onclick="handleOverlayClick(event)">
        <div class="modal-box">
            <div class="modal-title">✨ Yeni Özel Gün</div>

            <div class="form-group">
                <label>Günün Adı</label>
                <input type="text" id="input-title" placeholder="Ör: İlk buluşmamız 🥰" maxlength="60">
            </div>

            <div class="form-group">
                <label>Emoji Seç</label>
                <div class="emoji-picker" id="emoji-picker">
                    <button type="button" class="emoji-btn selected" data-emoji="💖" onclick="selectEmoji(this)">💖</button>
                    <button type="button" class="emoji-btn" data-emoji="🎂" onclick="selectEmoji(this)">🎂</button>
                    <button type="button" class="emoji-btn" data-emoji="🥂" onclick="selectEmoji(this)">🥂</button>
                    <button type="button" class="emoji-btn" data-emoji="🌸" onclick="selectEmoji(this)">🌸</button>
                    <button type="button" class="emoji-btn" data-emoji="✈️" onclick="selectEmoji(this)">✈️</button>
                    <button type="button" class="emoji-btn" data-emoji="🎁" onclick="selectEmoji(this)">🎁</button>
                    <button type="button" class="emoji-btn" data-emoji="🌙" onclick="selectEmoji(this)">🌙</button>
                    <button type="button" class="emoji-btn" data-emoji="🏖️" onclick="selectEmoji(this)">🏖️</button>
                    <button type="button" class="emoji-btn" data-emoji="🎵" onclick="selectEmoji(this)">🎵</button>
                    <button type="button" class="emoji-btn" data-emoji="🦋" onclick="selectEmoji(this)">🦋</button>
                    <button type="button" class="emoji-btn" data-emoji="⭐" onclick="selectEmoji(this)">⭐</button>
                    <button type="button" class="emoji-btn" data-emoji="🍀" onclick="selectEmoji(this)">🍀</button>
                </div>
            </div>

            <div class="form-group">
                <label>Tarih</label>
                <input type="date" id="input-date">
            </div>

            <div class="form-group">
                <label>Sayaç Türü</label>
                <select id="input-mode">
                    <option value="elapsed">Bu günden kaç gün geçti 📆</option>
                    <option value="countdown">Bu güne kaç gün kaldı ⏳</option>
                    <option value="anniversary">Her yıl yıldönümü (gün sayar + ne kadar kaldı) 🔄</option>
                </select>
            </div>

            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">İptal</button>
                <button class="btn-save" onclick="saveDay()">Kaydet 💾</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, orderBy, query, serverTimestamp }
            from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB1EbNEABIODcVts24HpES1UebXQ4wTifU",
            authDomain: "ayseye-surpriz.firebaseapp.com",
            projectId: "ayseye-surpriz",
            storageBucket: "ayseye-surpriz.firebasestorage.app",
            messagingSenderId: "531177459988",
            appId: "1:531177459988:web:09060a95bea0b06f197201"
        };

        const app = initializeApp(firebaseConfig);
        const db  = getFirestore(app);
        const colRef = collection(db, 'special_days');

        // ===== SABİT GÜNLER =====
        const staticDays = [
            { id: 'ayse-bday',    title: "Ayşe'nin Doğum Günü ✨", icon: "🎂", date: "08 Temmuz 2010",  type: "recurring",           month: 6,  day: 8,  yearStart: 2010 },
            { id: 'mert-bday',    title: "Mert'in Doğum Günü 😎",  icon: "🎁", date: "20 Kasım 2009",   type: "recurring",           month: 10, day: 20, yearStart: 2009 },
            { id: 'anniversary',  title: "Aşkımızın Başlangıcı 💖", icon: "🥂", date: "25 Şubat 2026",  type: "recurring_with_past",  month: 1,  day: 25, yearStart: 2026 },
            { id: 'first-meet',   title: "İlk Tanıştığımız Gün 🦋", icon: "🦋", date: "26 Mayıs 2025",  type: "past_only",           year: 2025, month: 4, day: 26 }
        ];

        let customDays = [];
        let hasConfetti = false;

        // ===== HESAPLAMALAR =====
        function calcDiff(targetDate) {
            const today = new Date(); today.setHours(0,0,0,0);
            return Math.ceil((targetDate - today) / 86400000);
        }

        function calcElapsed(startDate) {
            const today = new Date();
            return Math.floor((today - startDate) / 86400000);
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');
            return d.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        // ===== RENDER =====
        function renderAll() {
            const container = document.getElementById('days-container');
            container.innerHTML = '';
            hasConfetti = false;
            const today = new Date(); today.setHours(0,0,0,0);

            // Sabit günler
            staticDays.forEach(item => {
                let statusText = '', cssClass = '', isTodayEvent = false;

                if (item.type === 'recurring' || item.type === 'recurring_with_past') {
                    let next = new Date(today.getFullYear(), item.month, item.day);
                    if (today > next) next.setFullYear(today.getFullYear() + 1);
                    const dLeft = calcDiff(next);

                    if (dLeft === 0) { statusText = 'Bugün! 🎉'; isTodayEvent = true; hasConfetti = true; }
                    else { statusText = dLeft + ' güne kadar'; }

                    if (item.type === 'recurring_with_past') {
                        const st = new Date(item.yearStart, item.month, item.day);
                        const passed = calcElapsed(st);
                        if (passed >= 0) {
                            statusText = passed + " gündür sevgiliyiz ❤️<br><span style='font-size:0.9rem;color:#aaa;font-weight:normal;margin-top:5px;display:block;'>Sonraki kutlamaya: " + dLeft + " gün</span>";
                        }
                    }
                } else if (item.type === 'past_only') {
                    const pd = new Date(item.year, item.month, item.day);
                    statusText = calcElapsed(pd) + ' gündür tanışıyoruz 🥰';
                    cssClass = 'day-passed';
                }

                container.innerHTML += `
                    <div class="day-card ${isTodayEvent ? 'is-today' : ''}">
                        <div class="day-icon">${item.icon}</div>
                        <div class="day-title">${item.title}</div>
                        <div class="day-date">${item.date}</div>
                        <div class="day-countdown ${cssClass}">${statusText}</div>
                    </div>`;
            });

            // Kullanıcı özel günleri
            customDays.forEach(item => {
                let statusText = '', cssClass = '', isTodayEvent = false;
                const d = new Date(item.date + 'T00:00:00');

                if (item.mode === 'elapsed') {
                    const passed = calcElapsed(d);
                    if (passed === 0) { statusText = 'Bugün! 🎉'; isTodayEvent = true; hasConfetti = true; cssClass = 'day-passed'; }
                    else if (passed > 0) { statusText = passed + ' gün geçti 📆'; cssClass = 'day-passed'; }
                    else { statusText = Math.abs(passed) + ' gün sonra ⏳'; cssClass = 'day-future'; }

                } else if (item.mode === 'countdown') {
                    const dLeft = calcDiff(d);
                    if (dLeft === 0) { statusText = 'Bugün! 🎉'; isTodayEvent = true; hasConfetti = true; }
                    else if (dLeft > 0) { statusText = dLeft + ' gün kaldı ⏳'; cssClass = 'day-future'; }
                    else { statusText = Math.abs(dLeft) + ' gün geçti 📆'; cssClass = 'day-passed'; }

                } else if (item.mode === 'anniversary') {
                    let next = new Date(today.getFullYear(), d.getMonth(), d.getDate());
                    if (today > next) next.setFullYear(today.getFullYear() + 1);
                    const dLeft = calcDiff(next);
                    const passed = calcElapsed(d);
                    const years = Math.floor(passed / 365);

                    if (dLeft === 0) { statusText = 'Bugün yıldönümü! 🎉'; isTodayEvent = true; hasConfetti = true; }
                    else {
                        statusText = (passed >= 0 ? passed + ' gün oldu' : Math.abs(passed) + ' gün sonra') +
                            (years > 0 ? ' (' + years + '. yıl)' : '') +
                            "<br><span style='font-size:0.9rem;color:#aaa;font-weight:normal;margin-top:5px;display:block;'>Bir sonraki: " + dLeft + " gün</span>";
                    }
                }

                var cardContent = '<div class="day-card custom-card ' + (isTodayEvent ? 'is-today' : '') + '">';
                cardContent += '<button class="delete-btn" onclick="deleteDay(\'' + item.docId + '\')" title="Sil">✕</button>';
                cardContent += '<div class="day-icon">' + item.icon + '</div>';
                cardContent += '<div class="day-title">' + item.title + '</div>';
                cardContent += '<div class="day-date">' + formatDate(item.date) + '</div>';
                cardContent += '<div class="day-countdown ' + cssClass + '">' + statusText + '</div></div>';
                container.innerHTML += cardContent;
            });

            if (hasConfetti) setTimeout(shootConfetti, 500);
        }

        // ===== FİREBASE DİNLE =====
        onSnapshot(query(colRef, orderBy('ts', 'asc')), function(snap) {
            customDays = snap.docs.map(function(d) {
                var data = d.data();
                return { docId: d.id, title: data.title, date: data.date, mode: data.mode, icon: data.icon, ts: data.ts };
            });
            renderAll();
        });

        // ===== EKLE =====
        window.saveDay = async function() {
            var title = document.getElementById('input-title').value.trim();
            var date  = document.getElementById('input-date').value;
            var mode  = document.getElementById('input-mode').value;
            var selectedIconBtn = document.querySelector('.emoji-btn.selected');
            var icon  = (selectedIconBtn ? selectedIconBtn.dataset.emoji : '💖');

            if (!title) { alert('Lütfen bir isim yaz 🥺'); return; }
            if (!date)  { alert('Lütfen bir tarih seç 📅'); return; }

            const btn = document.querySelector('.btn-save');
            btn.disabled = true; btn.textContent = '⏳ Kaydediliyor...';

            try {
                await addDoc(colRef, { title: title, date: date, mode: mode, icon: icon, ts: serverTimestamp() });
                
                if (window.sendLoveNotification) {
                    var author = localStorage.getItem('active_player') || 'Sevgilin';
                    window.sendLoveNotification("Yeni Bir Özel Gün Eklendi 📅", author + " takvimimize yeni bir tarih mühürledi: \"" + title + "\"");
                }

                closeModal();
            } catch(e) {
                console.error(e);
                alert('Kayıt hatası 😔');
            } finally {
                btn.disabled = false; btn.textContent = 'Kaydet 💾';
            }
        };

        // ===== SİL =====
        window.deleteDay = async function(docId) {
            if (!confirm('Bu günü silmek istiyor musun? 🥺')) return;
            try { await deleteDoc(doc(db, 'special_days', docId)); }
            catch(e) { console.error(e); }
        };

        // ===== CONFETTI =====
        function shootConfetti() {
            var dur = 3000, end = performance.now() + dur;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };
            var iv = setInterval(function() {
                var left = end - performance.now();
                if (left <= 0) return clearInterval(iv);
                var n = 50 * (left / dur);
                confetti(Object.assign({}, defaults, { particleCount: n, origin: { x: Math.random()*0.3+0.1, y: Math.random()-0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount: n, origin: { x: Math.random()*0.3+0.7, y: Math.random()-0.2 } }));
            }, 250);
        }
    </script>

    <script>
        let selectedEmoji = '💖';

        window.selectEmoji = function(btn) {
            document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedEmoji = btn.dataset.emoji;
        };

        window.openModal = function() {
            document.getElementById('add-modal').classList.add('open');
            document.getElementById('input-title').value = '';
            document.getElementById('input-date').value = '';
            document.getElementById('input-mode').value = 'elapsed';
            document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
            document.querySelector('.emoji-btn[data-emoji="💖"]').classList.add('selected');
        };

        window.closeModal = function() {
            document.getElementById('add-modal').classList.remove('open');
        };

        window.handleOverlayClick = function(e) {
            if (e.target === document.getElementById('add-modal')) closeModal();
        };
    </script>

<script type="module" src="time-tracker.js"></script>
</body>
</html>
