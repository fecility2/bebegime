<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Özel Günlerimiz 📅</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: #fff;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #background-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1a0520 0%, #0a0208 100%);
        }

        .back-nav {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 30px;
            color: #fff;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .header {
            margin-top: 60px;
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: var(--primary);
            text-shadow: 0 0 15px rgba(255, 75, 114, 0.5);
            margin-bottom: 15px;
        }

        .header p {
            opacity: 0.8;
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .days-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
            padding-bottom: 50px;
        }

        .day-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            text-align: center;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 220px;
        }

        .day-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 15px 30px rgba(255, 75, 114, 0.2);
        }

        .day-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .day-title {
            font-size: 1.6rem;
            margin-bottom: 10px;
            font-family: 'Playfair Display', serif;
        }

        .day-date {
            font-family: 'Caveat', cursive;
            font-size: 1.6rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 15px;
        }

        .day-countdown {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--gold, #ffd700);
            background: rgba(255, 215, 0, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            display: inline-block;
            margin-top: auto;
        }

        .day-passed {
            color: #1ed760;
            background: rgba(30, 215, 96, 0.1);
            border-color: rgba(30, 215, 96, 0.3);
        }

        .is-today {
            animation: pulse-card 2s infinite;
            border-color: #ffd700;
        }

        @keyframes pulse-card {
            0% {
                box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
            }

            50% {
                box-shadow: 0 0 35px rgba(255, 215, 0, 0.6);
            }

            100% {
                box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.5rem;
            }

            .header p {
                font-size: 1.1rem;
            }

            .day-card {
                padding: 25px 20px;
                min-height: 200px;
            }

            .day-icon {
                font-size: 3rem;
            }
        }
    </style>
</head>

<body>

    <div id="background-canvas"></div>
    <a href="index.html" class="back-nav">← Ana Sayfaya Dön</a>

    <div class="header">
        <h1>Özel Günlerimiz 📅</h1>
        <p>Birlikte paylaştığımız, heyecanla beklediğimiz ve sayarak büyüttüğümüz o harika günler...</p>
    </div>

    <div class="days-container" id="days-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        const daysContainer = document.getElementById('days-container');

        const specialDays = [
            {
                id: 'ayse-bday',
                title: "Ayşe'nin Doğum Günü ✨",
                icon: "🎂",
                date: "08 Temmuz 2010",
                type: "recurring",
                month: 6, // 0-indexed (July)
                day: 8,
                yearStart: 2010
            },
            {
                id: 'mert-bday',
                title: "Mert'in Doğum Günü 😎",
                icon: "🎁",
                date: "20 Kasım 2009",
                type: "recurring",
                month: 10, // 0-indexed (November)
                day: 20,
                yearStart: 2009
            },
            {
                id: 'anniversary',
                title: "Aşkımızın Başlangıcı 💖",
                icon: "🥂",
                date: "25 Şubat 2026",
                type: "recurring_with_past",
                month: 1, // 0-indexed (February)
                day: 25,
                yearStart: 2026
            },
            {
                id: 'first-meet',
                title: "İlk Tanıştığımız Gün 🦋",
                icon: "눈",
                date: "26 Mayıs 2025",
                type: "past_only",
                year: 2025,
                month: 4, // 0-indexed (May)
                day: 26
            }
        ];

        let hasConfetti = false;

        function calculateDiff(targetDate) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const timeDiff = targetDate.getTime() - today.getTime();
            const daysDiff = Math.ceil(timeDiff / (1000 * 3600 * 24));
            return daysDiff;
        }

        function calculateElapsed(startDate) {
            const today = new Date();
            const timeDiff = today.getTime() - startDate.getTime();
            const daysDiff = Math.floor(timeDiff / (1000 * 3600 * 24));
            return daysDiff;
        }

        function renderCards() {
            daysContainer.innerHTML = '';
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            specialDays.forEach(item => {
                let statusText = "";
                let isTodayEvent = false;
                let cssClass = "";

                if (item.type === "recurring" || item.type === "recurring_with_past") {
                    let nextOccur = new Date(today.getFullYear(), item.month, item.day);
                    if (today.getTime() > nextOccur.getTime()) {
                        nextOccur.setFullYear(today.getFullYear() + 1);
                    }

                    const daysLeft = calculateDiff(nextOccur);

                    if (daysLeft === 0) {
                        statusText = "Bugün! 🎉";
                        isTodayEvent = true;
                        hasConfetti = true;
                    } else {
                        statusText = daysLeft + " güne kadar";
                    }

                    // For anniversary, append elapsed time
                    if (item.type === "recurring_with_past") {
                        const startD = new Date(item.yearStart, item.month, item.day);
                        const passedDays = calculateElapsed(startD);
                        if (passedDays >= 0) {
                            statusText = passedDays + " gündür sevgiliyiz ❤️<br><span style='font-size: 0.9rem; color: #aaa; font-weight: normal; margin-top: 5px; display: block;'>Sonraki kutlamaya: " + daysLeft + " gün</span>";
                        }
                    }
                } else if (item.type === "past_only") {
                    const passDate = new Date(item.year, item.month, item.day);
                    const passedDays = calculateElapsed(passDate);
                    statusText = passedDays + " gündür tanışıyoruz 🥰";
                    cssClass = "day-passed";
                }

                const cardHtml = `
                    <div class="day-card ${isTodayEvent ? 'is-today' : ''}">
                        <div class="day-icon">${item.icon}</div>
                        <div class="day-title">${item.title}</div>
                        <div class="day-date">${item.date}</div>
                        <div class="day-countdown ${cssClass}">${statusText}</div>
                    </div>
                `;
                daysContainer.innerHTML += cardHtml;
            });

            if (hasConfetti) {
                setTimeout(shootConfetti, 500);
            }
        }

        function shootConfetti() {
            var duration = 3 * 1000;
            var animationEnd = window.performance.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function () {
                var timeLeft = animationEnd - window.performance.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 50 * (timeLeft / duration);
                // since particles fall down, start a bit higher than random
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        renderCards();
    </script>
</body>

</html>
