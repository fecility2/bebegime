<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalp Avcısı 💣</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: #fff; margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        #background-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at center, #1a0520 0%, #0a0208 100%);
        }

        .back-nav {
            position: fixed; top: 20px; left: 20px;
            background: rgba(255,255,255,0.05); padding: 10px 20px;
            border-radius: 30px; color: #fff; text-decoration: none;
            border: 1px solid rgba(255,255,255,0.1); z-index: 100;
        }

        .header { margin-top: 60px; text-align: center; }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 3rem; color: var(--primary); margin-bottom: 5px; }

        .wallet-display {
            background: rgba(255, 75, 114, 0.1);
            border: 1px solid var(--primary); padding: 10px 20px; border-radius: 20px;
            font-size: 1.2rem; font-weight: 600; margin: 20px 0;
            display: flex; align-items: center; gap: 8px; justify-content: center;
        }

        .controls {
            background: rgba(255, 255, 255, 0.05); padding: 25px; border-radius: 20px;
            text-align: center; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;
        }

        .bet-input {
            width: 100px; padding: 10px; font-size: 1.2rem;
            border-radius: 10px; border: 1px solid var(--primary);
            background: rgba(0,0,0,0.5); color: #fff; text-align: center;
            margin: 10px; font-family: 'Outfit', sans-serif;
        }

        .btn-play {
            background: linear-gradient(45deg, #1ed760, #1db954);
            color: #fff; border: none; padding: 12px 25px; border-radius: 30px;
            font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .btn-play:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(30,215,96,0.3); }

        .game-area {
            display: none;
            flex-direction: column; align-items: center; width: 100%; max-width: 400px;
        }

        .multiplier-bar {
            width: 100%; display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 15px; font-size: 1.3rem; font-weight: 600;
        }

        .cashout-btn {
            background: #ff8c00; color: #fff; border: none; padding: 10px 20px;
            border-radius: 20px; font-weight: bold; cursor: pointer; display: none;
            box-shadow: 0 0 15px rgba(255,140,0,0.4);
        }

        .grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; margin-bottom: 30px;
        }

        .box {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 15px; aspect-ratio: 1;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; cursor: pointer; transition: 0.3s;
        }

        .box:hover { background: rgba(255,75,114,0.2); border-color: var(--primary); }
        .box.opened { cursor: default; pointer-events: none; }
        .box.safe { background: rgba(30,215,96,0.2); border-color: #1ed760; }
        .box.bomb { background: rgba(255,0,0,0.3); border-color: #ff0000; animation: shake 0.5s; }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div id="background-canvas"></div>
    <a href="games.html" class="back-nav">← Oyunlar Menüsü</a>

    <div class="header">
        <h1>Kalp Avcısı 💣</h1>
        <div class="wallet-display" id="wallet-disp">Giriş Yapılıyor... <span>❤️</span></div>
    </div>

    <div class="controls" id="start-panel">
        <p>16 kutudan 3'ünde kırık kalp (💔) gizli. Geri kalanındaki atan kalpleri (❤️) buldukça paran katlanacak!</p>
        <div>
            Ne Kadar Yatırcaksın? 
            <input type="number" id="bet-amt" class="bet-input" value="10" min="1"> ❤️
        </div>
        <button class="btn-play" onclick="startGame()">Oyunu Başlat</button>
    </div>

    <div class="game-area" id="game-area">
        <div class="multiplier-bar">
            <span>Çarpan: <span id="mult-text" style="color:#ff8c00">1.00x</span></span>
            <span>Kazanılan: <span id="won-text" style="color:#1ed760">0</span> ❤️</span>
            <button class="cashout-btn" id="cashout-btn" onclick="cashOut()">Parayı Çek</button>
        </div>
        <div class="grid" id="grid"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
        import { getFirestore, enableIndexedDbPersistence, doc, getDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyB1EbNEABIODcVts24HpES1UebXQ4wTifU",
            authDomain: "ayseye-surpriz.firebaseapp.com",
            projectId: "ayseye-surpriz",
            storageBucket: "ayseye-surpriz.firebasestorage.app",
            messagingSenderId: "531177459988",
            appId: "1:531177459988:web:09060a95bea0b06f197201"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        enableIndexedDbPersistence(db).catch(console.error);
        const ecoRef = doc(db, 'economy', 'balances');

        const currentUser = localStorage.getItem('active_player');
        if (!currentUser) window.location.href = 'index.html';

        let userBalance = 0;
        
        onSnapshot(ecoRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                userBalance = data[currentUser] || 0;
                document.getElementById('wallet-disp').innerHTML = `${userBalance} <span>❤️</span> (${currentUser})`;
            }
        });

        let currentBet = 0;
        let currentMult = 1.0;
        let boxes = [];
        let isPlaying = false;
        const totalBoxes = 16;
        const totalBombs = 3;

        window.startGame = async function() {
            const betInput = parseInt(document.getElementById('bet-amt').value);
            if (isNaN(betInput) || betInput <= 0) {
                alert("Geçerli bir miktar gir sevgilim."); return;
            }
            if (userBalance < betInput) {
                alert("Yetersiz bakiye! 🥺"); return;
            }

            try {
                await updateDoc(ecoRef, { [currentUser]: userBalance - betInput });
                currentBet = betInput;
                currentMult = 1.0;
                isPlaying = true;

                document.getElementById('start-panel').style.display = 'none';
                document.getElementById('game-area').style.display = 'flex';
                document.getElementById('cashout-btn').style.display = 'none';
                updateBar();
                
                initGrid();
            } catch (e) {
                console.error(e);
                alert("Bağlantı hatası!");
            }
        };

        function initGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            boxes = new Array(totalBoxes).fill('heart');
            
            // Bomb yerleri
            let placedBombs = 0;
            while(placedBombs < totalBombs) {
                let r = Math.floor(Math.random() * totalBoxes);
                if(boxes[r] !== 'bomb') {
                    boxes[r] = 'bomb';
                    placedBombs++;
                }
            }

            for(let i=0; i<totalBoxes; i++) {
                let b = document.createElement('div');
                b.className = 'box';
                b.innerHTML = '❓';
                b.onclick = () => openBox(b, i);
                grid.appendChild(b);
            }
        }

        function openBox(el, index) {
            if(!isPlaying) return;
            
            const type = boxes[index];
            el.classList.add('opened');

            if(type === 'bomb') {
                el.innerHTML = '💔';
                el.classList.add('bomb');
                gameOver(false);
            } else {
                el.innerHTML = '❤️';
                el.classList.add('safe');
                
                // Increase multiplier roughly by +0.25 (scaled for fun)
                currentMult += 0.25;
                document.getElementById('cashout-btn').style.display = 'block';
                updateBar();

                // if opened all max safe boxes (13)
                const safes = document.querySelectorAll('.box.safe');
                if(safes.length === totalBoxes - totalBombs) {
                    gameOver(true); // Forced max win
                }
            }
        }

        function updateBar() {
            document.getElementById('mult-text').innerText = currentMult.toFixed(2) + 'x';
            document.getElementById('won-text').innerText = Math.floor(currentBet * currentMult);
        }

        window.cashOut = async function() {
            if(!isPlaying) return;
            gameOver(true);
        }

        async function gameOver(win) {
            isPlaying = false;
            let finalWin = win ? Math.floor(currentBet * currentMult) : 0;
            
            // Reveal everything
            const allEls = document.querySelectorAll('.box');
            allEls.forEach((el, i) => {
                if(!el.classList.contains('opened')) {
                    el.innerHTML = boxes[i] === 'bomb' ? '💔' : '❤️';
                    el.style.opacity = '0.5';
                }
            });

            if (win) {
                document.getElementById('cashout-btn').style.display = 'none';
                alert(`Harika! Tam ${finalWin} ❤️ Parayı Kurtardın! 🎉`);
                try {
                    const snap = await getDoc(ecoRef);
                    const curMoney = snap.data()[currentUser];
                    await updateDoc(ecoRef, { [currentUser]: curMoney + finalWin });
                } catch(e){}
            } else {
                document.getElementById('cashout-btn').style.display = 'none';
                alert("Eyvah Kırık Kalp! 💔 Bütün paran gitti...");
            }

            setTimeout(() => {
                document.getElementById('game-area').style.display = 'none';
                document.getElementById('start-panel').style.display = 'block';
            }, 3000);
        }
    </script>
</body>
</html>
