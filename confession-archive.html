<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aşk Arşivi 📩</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4b72;
            --bg-color: #0a0208;
            --text-main: #fce4ec;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 50px 20px;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            color: var(--primary);
            text-shadow: 0 0 15px rgba(255, 75, 114, 0.4);
        }

        .archive-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .envelope-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .envelope-card:hover {
            transform: translateY(-10px) rotate(2deg);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(255, 75, 114, 0.2);
        }

        .delete-letter {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            opacity: 0.2;
            transition: 0.3s;
            z-index: 5;
            padding: 5px;
        }

        .delete-letter:hover {
            opacity: 1;
            transform: scale(1.2);
            color: var(--primary);
        }

        .envelope-icon {
            font-size: 50px;
            margin-bottom: 15px;
            display: block;
        }

        .envelope-date {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 10px;
        }

        .envelope-status {
            font-weight: 700;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            display: inline-block;
            margin-top: 10px;
        }

        .status-success { background: rgba(72, 199, 142, 0.2); color: #48c78e; }
        .status-failed { background: rgba(255, 75, 114, 0.2); color: var(--primary); }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.show { display: flex; }

        .modal-content {
            background: #fff;
            color: #4a0e28;
            width: 90%;
            max-width: 500px;
            padding: 40px;
            border-radius: 25px;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            font-family: 'Playfair Display', serif;
            background-image: repeating-linear-gradient(transparent, transparent 33px, rgba(0,0,0,0.05) 33px, rgba(0,0,0,0.05) 34px);
            line-height: 34px;
        }

        .modal-content h2 { color: var(--primary); margin-bottom: 10px; font-size: 1.5rem; }
        .modal-content p { margin-bottom: 25px; font-size: 1.1rem; }

        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 25px;
            cursor: pointer;
            color: #999;
            line-height: 1;
        }

        .back-nav {
            position: fixed;
            top: 20px; left: 20px;
            background: rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 30px;
            color: #fff;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }

        @media (max-width: 600px) {
            .archive-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <a href="confessions.html" class="back-nav">← İtiraf Köşesi</a>

    <div class="header">
        <h1>Aşk Arşivi 📩</h1>
        <p>Aşılmaz denilen her şeyi nasıl aştığımızın hikayesi...</p>
    </div>

    <div class="archive-grid" id="archive-grid">
        <!-- Mektuplar buraya gelecek -->
        <p style="text-align: center; grid-column: 1/-1;">Mektuplar mühründen çıkarılıyor... 🕊️</p>
    </div>

    <!-- Mektup Detay Modalı -->
    <div id="letter-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modal-body">
                <!-- İçerik JS ile dolacak -->
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
        import { getFirestore, enableIndexedDbPersistence, collection, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB1EbNEABIODcVts24HpES1UebXQ4wTifU",
            authDomain: "ayseye-surpriz.firebaseapp.com",
            projectId: "ayseye-surpriz",
            storageBucket: "ayseye-surpriz.firebasestorage.app",
            messagingSenderId: "531177459988",
            appId: "1:531177459988:web:09060a95bea0b06f197201",
            measurementId: "G-2LBSDG1KDB"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        enableIndexedDbPersistence(db).catch(err => console.log('Offline DB:', err.code));

        const q = query(collection(db, "confessions"), orderBy("timestamp", "desc"));

        onSnapshot(q, (snapshot) => {
            const grid = document.getElementById('archive-grid');
            grid.innerHTML = '';

            if (snapshot.empty) {
                grid.innerHTML = '<p style="grid-column: 1/-1; opacity: 0.5;">Henüz yazılmış bir mektup yok sevgilim. ❤️</p>';
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                const d = data.timestamp ? new Date(data.timestamp.seconds * 1000) : null;
                const formattedDate = d ? d.toLocaleDateString('tr-TR') + ' - ' + d.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' }) : '...';
                
                const card = document.createElement('div');
                card.className = 'envelope-card';
                card.innerHTML = `
                    <div class="delete-letter" onclick="event.stopPropagation(); deleteConfession('${doc.id}')">🗑️</div>
                    <span class="envelope-icon">📩</span>
                    <div class="envelope-date">${formattedDate}</div>
                    <div class="envelope-status ${data.status === 'Aşarız' ? 'status-success' : 'status-failed'}">
                        Durum: ${data.status}
                    </div>
                `;
                card.onclick = () => openModal(data);
                grid.appendChild(card);
            });
        });

        window.deleteConfession = async (id) => {
            if(confirm("Bu mektubu arşivden silmek istediğine emin misin sevgilim? 🥺")) {
                try {
                    await deleteDoc(doc(db, "confessions", id));
                } catch (e) {
                    console.error("Silme hatası:", e);
                }
            }
        };

        window.openModal = (data) => {
            const body = document.getElementById('modal-body');
            body.innerHTML = `
                <div style="font-size: 2.5rem; text-align: center; margin-bottom: 20px;">✉️</div>
                <h2>Neden Kızmıştın?</h2>
                <p>${data.anger}</p>
                <hr style="border: none; border-top: 1px dashed #ccc; margin: 20px 0;">
                <h2>Neden Hala Çok Seviyorsun?</h2>
                <p>${data.love}</p>
                <div style="text-align: center; margin-top: 30px; font-family: 'Caveat', cursive; font-size: 1.5rem; color: #ff4b72;">
                    Hep aşacağız, seni çok seviyorum. ❤️
                </div>
            `;
            document.getElementById('letter-modal').classList.add('show');
        };

        window.closeModal = () => {
            document.getElementById('letter-modal').classList.remove('show');
        };

        // Modal dışına tıklayınca kapat
        window.onclick = (event) => {
            const modal = document.getElementById('letter-modal');
            if (event.target == modal) closeModal();
        };
    </script>
<script type="module" src="time-tracker.js"></script>
</body>
</html>
