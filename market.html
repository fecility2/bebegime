<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aşk Marketi 🛍️</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
    <style>
        body { font-family: 'Outfit', sans-serif; color: #fff; margin: 0; padding: 20px; padding-bottom: 120px; min-height: 100vh; background: #0a0208; }
        #background-canvas { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #1a0520 0%, #0a0208 100%); }
        .back-nav { position: fixed; top: 20px; left: 20px; background: rgba(255,255,255,.06); padding: 10px 18px; border-radius: 25px; color: #fff; text-decoration: none; border: 1px solid rgba(255,255,255,.16); }
        .header { text-align: center; margin-top: 58px; margin-bottom: 22px; }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 2.7rem; color: var(--primary); margin: 0; }
        .wallet-row { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin: 16px 0 28px; }
        .chip { background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.16); border-radius: 24px; padding: 10px 16px; font-weight: 600; }
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
        .tab-btn { border: 1px solid rgba(255,255,255,.2); background: rgba(255,255,255,.07); color: #fff; border-radius: 22px; padding: 10px 16px; cursor: pointer; }
        .tab-btn.active { border-color: var(--primary); background: rgba(255,75,114,.18); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 18px; max-width: 980px; margin: 0 auto; }
        .item-card { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12); border-radius: 18px; padding: 16px; }
        .item-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .item-icon { font-size: 1.6rem; }
        .item-title { font-size: 1.05rem; font-weight: 700; }
        .item-desc { opacity: .78; min-height: 42px; font-size: .92rem; }
        .item-meta { margin-top: 10px; font-size: .88rem; opacity: .9; display: flex; justify-content: space-between; gap: 8px; }
        .buy-btn { margin-top: 12px; width: 100%; border: none; border-radius: 12px; padding: 10px 12px; font-weight: 700; cursor: pointer; background: linear-gradient(45deg, #ff4b72, #ff8c00); color: #fff; }
        .buy-btn:disabled { opacity: .5; cursor: not-allowed; }
        .status { max-width: 980px; margin: 12px auto 0; text-align: center; font-weight: 600; min-height: 24px; }
        .photo-market { max-width: 980px; margin: 30px auto 0; width: 100%; }
        .photo-form { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12); border-radius: 16px; padding: 14px; display: grid; grid-template-columns: 1.1fr 1fr 1fr auto; gap: 10px; align-items: center; }
        .photo-form input { background: rgba(0,0,0,.35); border: 1px solid rgba(255,255,255,.22); border-radius: 10px; color: #fff; padding: 10px; }
        .photo-grid { margin-top: 14px; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
        .photo-card { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12); border-radius: 14px; overflow: hidden; }
        .photo-card img { width: 100%; height: 160px; object-fit: cover; display: block; }
        .photo-meta { padding: 10px; font-size: .88rem; }
        .photo-actions { display: flex; gap: 8px; margin-top: 8px; }
        .action-btn { flex: 1; border: none; border-radius: 10px; padding: 8px; cursor: pointer; font-weight: 700; }
        .buy-photo-btn { background: linear-gradient(45deg, #ff4b72, #ff8c00); color: #fff; }
        .dl-btn { background: rgba(255,255,255,.12); color: #fff; text-decoration: none; text-align: center; display: inline-block; }
        @media (max-width: 900px) { .photo-form { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div id="background-canvas"></div>
    <a href="games.html" class="back-nav">← Oyunlar Menüsü</a>
    <div class="header">
        <h1>Aşk Marketi 🛍️</h1>
        <p style="opacity:.8;">Kazandığın Aşk Paralarıyla güçlen, güzelleştir, eğlen.</p>
    </div>
    <div class="wallet-row">
        <div class="chip">Oyuncu: <span id="user-name">...</span></div>
        <div class="chip">Bakiye: <span id="user-balance">0</span> ❤️</div>
    </div>
    <div class="tabs">
        <button class="tab-btn active" data-tab="all">Tümü</button>
        <button class="tab-btn" data-tab="cosmetic">Kozmetik</button>
        <button class="tab-btn" data-tab="consumable">Tüketilebilir</button>
        <button class="tab-btn" data-tab="coupon" style="color: #ff8c00; border-color: rgba(255,140,0,0.5);">Kuponlar 🎟️</button>
    </div>
    <div id="items-grid" class="grid"></div>
    <div id="status-msg" class="status"></div>
    <div class="photo-market">
        <h2 style="font-family:'Playfair Display',serif; margin: 10px 0 12px; color: var(--primary);">Fotoğraf Pazarı</h2>
        <div class="tabs" style="margin-bottom:12px;">
            <button class="tab-btn active" data-photo-tab="all">Tüm İlanlar</button>
            <button class="tab-btn" data-photo-tab="mine">Kendi İlanlarım</button>
            <button class="tab-btn" data-photo-tab="purchased">Satın Aldıklarım</button>
        </div>
        <div class="photo-form">
            <input type="file" id="photo-file" accept="image/*">
            <input type="number" id="photo-price" min="1" placeholder="Fiyat">
            <input type="text" id="photo-title" maxlength="60" placeholder="Başlık (opsiyonel)">
            <button class="buy-btn" id="list-photo-btn">Satışa Koy</button>
        </div>
        <div id="photo-grid" class="photo-grid"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
        import {
            getFirestore,
            enableIndexedDbPersistence,
            doc,
            collection,
            getDoc,
            getDocs,
            setDoc,
            runTransaction,
            onSnapshot,
            serverTimestamp,
            query,
            orderBy
        } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB1EbNEABIODcVts24HpES1UebXQ4wTifU",
            authDomain: "ayseye-surpriz.firebaseapp.com",
            projectId: "ayseye-surpriz",
            storageBucket: "ayseye-surpriz.firebasestorage.app",
            messagingSenderId: "531177459988",
            appId: "1:531177459988:web:09060a95bea0b06f197201"
        };

        const DEFAULT_ITEMS = [
            { id: "cos_badge_star", title: "Yıldız Rozet", icon: "⭐", type: "cosmetic", price: 1250, effectKey: "badge_star", description: "Profilde yıldız rozeti." },
            { id: "cos_theme_rose", title: "Gül Teması", icon: "🌹", type: "cosmetic", price: 1850, effectKey: "theme_rose", description: "Oyun arka planına gül tonları." },
            { id: "con_memory_retry", title: "Hafıza İkinci Şans", icon: "🃏", type: "consumable", price: 175, effectKey: "memory_retry", description: "Aşk Hafızası'nda 1 kez +10sn." },
            { id: "con_mine_shield", title: "Kalp Kalkanı", icon: "🛡️", type: "consumable", price: 750, effectKey: "mine_shield", description: "Kalp Avcısı'nda ilk bombayı bloklar." },
            { id: "con_dice_insurance", title: "Zar Sigortası", icon: "🎲", type: "consumable", price: 150, effectKey: "dice_insurance", description: "Şans Zarı'nda kötü sonuçta min 100❤️." },
            { id: "con_jackpot_boost", title: "Jackpot Boost", icon: "🎰", type: "consumable", price: 425, effectKey: "jackpot_boost", description: "Tek turda jackpot şansını artırır." },
            { id: "con_scratch_extra", title: "Ekstra Kazıma", icon: "🎟️", type: "consumable", price: 50, effectKey: "scratch_extra", description: "Kazı-Kazan'da kaybedersen 1 ek şans." },
            { id: "coupon_hug", title: "Sınırsız Sarılma", icon: "🫂", type: "coupon", price: 1000, effectKey: "coupon_hug", description: "Anında ve koşulsuz sımsıcak sarılma hakkı." },
            { id: "coupon_snack", title: "Atıştırmalık Kölesi", icon: "🍿", type: "coupon", price: 2500, effectKey: "coupon_snack", description: "Dizi/Film izlerken abur cubur veya su getirme hizmeti." },
            { id: "coupon_choice", title: "Seçim Hakkı", icon: "🎮", type: "coupon", price: 1200, effectKey: "coupon_choice", description: "O gün izlenecek filmi veya oynanacak oyunu sen belirlersin." },
            { id: "coupon_hair", title: "Saçlarımla Oyna", icon: "💆‍♀️", type: "coupon", price: 1500, effectKey: "coupon_hair", description: "15 dakika boyunca sadece saçlarımla oynama/sevme seansı." },
            { id: "coupon_call", title: "Gece Boyu Telefon", icon: "📞", type: "coupon", price: 2000, effectKey: "coupon_call", description: "Gece sabaha kadar telefonda kalma ve beraber uyuma." },
            { id: "coupon_treat", title: "Tatlı/Kahve İkramı", icon: "🧋", type: "coupon", price: 3000, effectKey: "coupon_treat", description: "Buluşmada en sevdiğin tatlı, kahve veya abur cubur benden!" },
            { id: "coupon_right", title: "Haklı Sayılma Jokeri", icon: "👑", type: "coupon", price: 5000, effectKey: "coupon_right", description: "Haksız olsan bile ufak bir inatlaşmada direkt haklı sayılma." }
        ];
        const MIN_PRICE = 1;
        const IMGBB_KEY = "7916dd11376f59a547ed252799f1328a";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        enableIndexedDbPersistence(db).catch(() => {});

        const currentUser = localStorage.getItem('active_player');
        if (!currentUser) window.location.href = 'index.html';

        const economyRef = doc(db, 'economy', 'balances');
        const inventoryRef = doc(db, 'user_inventory', currentUser);
        const itemsRef = collection(db, 'shop_items');
        const photoItemsRef = collection(db, 'photo_market_items');
        const activityRef = collection(db, 'activity_logs');
        const statusEl = document.getElementById('status-msg');
        const gridEl = document.getElementById('items-grid');

        let selectedTab = 'all';
        let userBalance = 0;
        let inventory = { cosmetics: {}, consumables: {}, activeCosmetics: {}, purchasedPhotos: {} };
        let shopItems = [];
        let photoItems = [];
        let selectedPhotoTab = 'all';

        document.getElementById('user-name').textContent = currentUser;
        document.querySelectorAll('[data-tab]').forEach(btn => {
            if (btn.dataset.photoTab) return;
            btn.addEventListener('click', () => {
                document.querySelectorAll('[data-tab]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedTab = btn.dataset.tab;
                renderItems();
            });
        });
        document.querySelectorAll('[data-photo-tab]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('[data-photo-tab]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedPhotoTab = btn.dataset.photoTab;
                renderPhotos();
            });
        });

        async function ensureInventoryDoc() {
            const snap = await getDoc(inventoryRef);
            if (!snap.exists()) {
                await setDoc(inventoryRef, { cosmetics: {}, consumables: {}, activeCosmetics: {}, purchasedPhotos: {}, updatedAt: serverTimestamp() });
            }
        }

        async function ensureCatalog() {
            const snap = await getDocs(itemsRef);
            if (snap.empty) {
                for (const item of DEFAULT_ITEMS) {
                    await setDoc(doc(db, 'shop_items', item.id), { ...item, enabled: true });
                }
                shopItems = DEFAULT_ITEMS.map(x => ({ ...x, enabled: true }));
                return;
            }
            const loaded = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(i => i.enabled !== false);
            for (const item of loaded) {
                const defaultItem = DEFAULT_ITEMS.find(x => x.id === item.id);
                if (defaultItem && item.price !== defaultItem.price) {
                    await setDoc(doc(db, 'shop_items', item.id), { price: defaultItem.price }, { merge: true });
                    item.price = defaultItem.price;
                } else if ((item.price || 0) < MIN_PRICE) {
                    const bumped = defaultItem?.price || MIN_PRICE;
                    await setDoc(doc(db, 'shop_items', item.id), { price: bumped }, { merge: true });
                    item.price = bumped;
                }
            }
            shopItems = loaded;
        }

        function getStock(item) {
            if (item.type === 'cosmetic') return inventory.cosmetics?.[item.effectKey] ? 1 : 0;
            return inventory.consumables?.[item.effectKey] || 0;
        }

        function renderItems() {
            const list = shopItems.filter(item => selectedTab === 'all' ? true : item.type === selectedTab);
            gridEl.innerHTML = '';
            list.forEach(item => {
                const stock = getStock(item);
                const isOwnedCosmetic = item.type === 'cosmetic' && stock > 0;
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <div class="item-top"><div class="item-icon">${item.icon || '🛍️'}</div><div class="item-title">${item.title}</div></div>
                    <div class="item-desc">${item.description || ''}</div>
                    <div class="item-meta">
                        <span>Fiyat: ${item.price} ❤️</span>
                        <span>${item.type === 'cosmetic' ? (isOwnedCosmetic ? 'Sahipsin' : 'Kozmetik') : `Stok: ${stock}`}</span>
                    </div>
                    <button class="buy-btn" ${isOwnedCosmetic ? 'disabled' : ''} data-id="${item.id}">${isOwnedCosmetic ? 'Alındı' : 'Satın Al'}</button>
                `;
                card.querySelector('.buy-btn').addEventListener('click', () => purchaseItem(item.id));
                gridEl.appendChild(card);
            });
        }

        function canDownloadPhoto(item) {
            if (item.seller === currentUser) return true;
            return !!inventory.purchasedPhotos?.[item.id];
        }

        function renderPhotos() {
            const grid = document.getElementById('photo-grid');
            grid.innerHTML = '';
            const filtered = photoItems.filter(item => {
                if (selectedPhotoTab === 'mine') return item.seller === currentUser;
                if (selectedPhotoTab === 'purchased') return !!inventory.purchasedPhotos?.[item.id];
                return true;
            });
            filtered.forEach(item => {
                const card = document.createElement('div');
                const downloadable = canDownloadPhoto(item);
                const isOwn = item.seller === currentUser;
                const isRevealed = downloadable || isOwn;
                card.className = 'photo-card';
                card.innerHTML = `
                    ${isRevealed 
                        ? `<img src="${item.photoUrl}" alt="market-photo">`
                        : `<div style="width:100%; height:160px; background:linear-gradient(45deg, #1a0520, #0a0208); display:flex; align-items:center; justify-content:center; font-size:3rem; border-bottom:1px solid rgba(255,255,255,0.1);">🔒</div>`
                    }
                    <div class="photo-meta">
                        <div style="font-weight:700;">${isRevealed ? (item.title || 'Fotoğraf') : 'Gizli İçerik 🔒'}</div>
                        <div style="opacity:.8;">Satıcı: ${item.seller}</div>
                        <div style="margin-top:4px;">Fiyat: ${item.price} ❤️</div>
                        <div class="photo-actions">
                            <button class="action-btn buy-photo-btn" ${isOwn || downloadable ? 'disabled' : ''} data-buy="${item.id}">${isOwn ? 'Kendi ilanın' : (downloadable ? 'Satın Alındı' : 'Satın Al')}</button>
                            ${isOwn ? `<button class="action-btn dl-btn" data-edit="${item.id}">Düzenle</button>` : ''}
                            ${isOwn ? `<button class="action-btn dl-btn" data-remove="${item.id}">Kaldır</button>` : ''}
                            ${downloadable ? `<a class="action-btn dl-btn" href="${item.photoUrl}" download="ask-market-${item.id}.jpg" target="_blank" rel="noopener">İndir</a>` : ''}
                        </div>
                    </div>
                `;
                const buyBtn = card.querySelector('[data-buy]');
                if (buyBtn) buyBtn.addEventListener('click', () => buyPhoto(item.id));
                const editBtn = card.querySelector('[data-edit]');
                if (editBtn) editBtn.addEventListener('click', () => editPhotoListing(item.id));
                const removeBtn = card.querySelector('[data-remove]');
                if (removeBtn) removeBtn.addEventListener('click', () => removePhotoListing(item.id));
                grid.appendChild(card);
            });
        }

        async function logActivity(type, title, meta) {
            await setDoc(doc(activityRef), {
                type,
                title,
                user: currentUser,
                meta: meta || {},
                createdAt: serverTimestamp()
            });
        }

        async function purchaseItem(itemId) {
            statusEl.textContent = 'Satın alma işleniyor...';
            try {
                await runTransaction(db, async (tx) => {
                    const ecoSnap = await tx.get(economyRef);
                    const invSnap = await tx.get(inventoryRef);
                    const itemSnap = await tx.get(doc(db, 'shop_items', itemId));
                    if (!ecoSnap.exists() || !itemSnap.exists()) throw new Error('Eksik veri');

                    const item = { id: itemSnap.id, ...itemSnap.data() };
                    const ecoData = ecoSnap.data();
                    const invData = invSnap.exists() ? invSnap.data() : { cosmetics: {}, consumables: {}, activeCosmetics: {} };
                    const balance = ecoData[currentUser] || 0;
                    if (balance < item.price) throw new Error('Yetersiz bakiye');

                    const nextInv = {
                        cosmetics: { ...(invData.cosmetics || {}) },
                        consumables: { ...(invData.consumables || {}) },
                        activeCosmetics: { ...(invData.activeCosmetics || {}) }
                    };

                    if (item.type === 'cosmetic') {
                        if (nextInv.cosmetics[item.effectKey]) throw new Error('Zaten sahip');
                        nextInv.cosmetics[item.effectKey] = true;
                        if (!nextInv.activeCosmetics.gameTheme && item.effectKey.indexOf('theme_') === 0) {
                            nextInv.activeCosmetics.gameTheme = item.effectKey;
                        }
                    } else {
                        const cur = nextInv.consumables[item.effectKey] || 0;
                        nextInv.consumables[item.effectKey] = cur + 1;
                    }

                    tx.update(economyRef, { [currentUser]: balance - item.price });
                    tx.set(inventoryRef, { ...nextInv, updatedAt: serverTimestamp() }, { merge: true });
                    tx.set(doc(collection(db, 'shop_transactions')), {
                        user: currentUser,
                        itemId: item.id,
                        effectKey: item.effectKey,
                        type: item.type,
                        price: item.price,
                        createdAt: serverTimestamp()
                    });
                });
                await logActivity('market_purchase', 'Marketten ürün alındı', { itemId });
                statusEl.textContent = 'Satın alma başarılı.';
            } catch (e) {
                statusEl.textContent = e?.message || 'Satın alma başarısız.';
            }
        }

        async function uploadPhotoAndGetUrl(file) {
            const base64 = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
                reader.readAsDataURL(file);
            });
            const fd = new FormData();
            fd.append('image', base64);
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: fd });
            const json = await res.json();
            if (!json.success) throw new Error('Foto yükleme başarısız');
            return json.data.url;
        }

        async function listPhotoForSale() {
            const fileEl = document.getElementById('photo-file');
            const priceEl = document.getElementById('photo-price');
            const titleEl = document.getElementById('photo-title');
            const file = fileEl.files[0];
            const price = parseInt(priceEl.value, 10);
            const title = (titleEl.value || '').trim();
            if (!file) { statusEl.textContent = 'Lütfen fotoğraf seç.'; return; }
            if (isNaN(price) || price < MIN_PRICE) { statusEl.textContent = 'Geçerli bir fiyat gir.'; return; }
            statusEl.textContent = 'Fotoğraf yükleniyor...';
            try {
                const url = await uploadPhotoAndGetUrl(file);
                const ref = doc(collection(db, 'photo_market_items'));
                await setDoc(ref, {
                    seller: currentUser,
                    photoUrl: url,
                    price,
                    title,
                    active: true,
                    createdAt: serverTimestamp()
                });
                await logActivity('photo_listed', 'Fotoğraf satışa kondu', { title, price });
                fileEl.value = '';
                priceEl.value = '';
                titleEl.value = '';
                statusEl.textContent = 'Fotoğraf satışa eklendi.';
            } catch (e) {
                statusEl.textContent = e?.message || 'İlan eklenemedi.';
            }
        }

        async function editPhotoListing(photoId) {
            const item = photoItems.find(p => p.id === photoId);
            if (!item) return;
            const newPrice = parseInt(prompt('Yeni fiyatı gir:', item.price), 10);
            if (isNaN(newPrice) || newPrice < 1) {
                statusEl.textContent = 'Geçerli fiyat gir.';
                return;
            }
            const newTitle = prompt('Yeni başlık (boş bırakılabilir):', item.title || '') || '';
            await setDoc(doc(db, 'photo_market_items', photoId), { price: newPrice, title: newTitle.trim(), updatedAt: serverTimestamp() }, { merge: true });
            await logActivity('photo_edited', 'Foto ilanı düzenlendi', { photoId, price: newPrice });
            statusEl.textContent = 'İlan güncellendi.';
        }

        async function removePhotoListing(photoId) {
            if (!confirm('Bu ilanı kaldırmak istiyor musun?')) return;
            await setDoc(doc(db, 'photo_market_items', photoId), { active: false, removedAt: serverTimestamp() }, { merge: true });
            await logActivity('photo_removed', 'Foto ilanı kaldırıldı', { photoId });
            statusEl.textContent = 'İlan kaldırıldı.';
        }

        async function buyPhoto(photoId) {
            statusEl.textContent = 'Fotoğraf satın alınıyor...';
            try {
                await runTransaction(db, async (tx) => {
                    const photoRef = doc(db, 'photo_market_items', photoId);
                    const photoSnap = await tx.get(photoRef);
                    const ecoSnap = await tx.get(economyRef);
                    const buyerInvSnap = await tx.get(inventoryRef);
                    if (!photoSnap.exists() || !ecoSnap.exists()) throw new Error('Veri bulunamadı');
                    const photo = photoSnap.data();
                    if (!photo.active) throw new Error('İlan aktif değil');
                    if (photo.seller === currentUser) throw new Error('Kendi fotoğrafını satın alamazsın');
                    const eco = ecoSnap.data();
                    const buyerBalance = eco[currentUser] || 0;
                    if (buyerBalance < photo.price) throw new Error('Yetersiz bakiye');

                    const sellerRef = doc(db, 'economy', 'balances');
                    const sellerBalance = eco[photo.seller] || 0;
                    const buyerInv = buyerInvSnap.exists() ? buyerInvSnap.data() : { purchasedPhotos: {} };
                    const bought = { ...(buyerInv.purchasedPhotos || {}) };
                    bought[photoId] = true;

                    tx.update(economyRef, {
                        [currentUser]: buyerBalance - photo.price,
                        [photo.seller]: sellerBalance + photo.price
                    });
                    tx.set(inventoryRef, { purchasedPhotos: bought, updatedAt: serverTimestamp() }, { merge: true });
                    tx.set(doc(collection(db, 'shop_transactions')), {
                        user: currentUser,
                        seller: photo.seller,
                        photoId,
                        type: 'photo_purchase',
                        price: photo.price,
                        createdAt: serverTimestamp()
                    });
                });
                await logActivity('photo_purchased', 'Fotoğraf satın alındı', { photoId });
                statusEl.textContent = 'Fotoğraf satın alındı. Artık indirebilirsin.';
            } catch (e) {
                statusEl.textContent = e?.message || 'Satın alma başarısız.';
            }
        }

        onSnapshot(economyRef, (snap) => {
            if (!snap.exists()) return;
            const data = snap.data();
            userBalance = data[currentUser] || 0;
            document.getElementById('user-balance').textContent = userBalance;
        });

        onSnapshot(inventoryRef, (snap) => {
            if (!snap.exists()) return;
            inventory = snap.data();
            renderItems();
            renderPhotos();
        });

        onSnapshot(query(photoItemsRef, orderBy('createdAt', 'desc')), (snap) => {
            photoItems = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(x => x.active !== false);
            renderPhotos();
        });

        await ensureInventoryDoc();
        await ensureCatalog();
        renderItems();
        document.getElementById('list-photo-btn').addEventListener('click', listPhotoForSale);
    </script>
</body>
</html>
